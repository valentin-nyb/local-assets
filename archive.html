<head>

<body class="bg-[#050505] text-white flex">
    <aside id="sidebar" class="w-64 border-r border-[#27272a] bg-[#0a0a0a] flex flex-col transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 shrink-0 h-full"></aside>
    <main class="flex-1 p-8 overflow-y-auto">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-2xl font-bold uppercase tracking-tighter">Master Archive</h1>
                <p class="text-zinc-500 font-mono text-xs">Total Library Access</p>
            </div>
            <!DOCTYPE html>
            <html lang="en" class="dark scroll-smooth">
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
                <meta name="apple-mobile-web-app-capable" content="yes">
                <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
                <meta name="apple-mobile-web-app-title" content="local / assets">
                <title>local / assets - Archive</title>
    
                <script src="https://cdn.tailwindcss.com"></script>
                <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
                <script src="nav-component.js"></script>
    
                <script>
                    tailwind.config = {
                        theme: { extend: { colors: { background: '#050505', card: '#0a0a0a', primary: '#39FF14', border: '#27272a' } } }
                    }
                </script>
                <style>
                    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        
                    body { background-color: #050505 !important; color: white; font-family: 'JetBrains Mono', monospace !important; overflow: hidden; }
        
                    /* Unified Sidebar Styles */
                    .nav-link { font-family: 'JetBrains Mono', monospace !important; font-size: 12px !important; letter-spacing: 0.05em; transition: all 0.2s ease; border-left: 2px solid transparent; }
                    .nav-link.active { color: #39FF14 !important; background: rgba(57,255,20,0.05); border-left: 2px solid #39FF14; }
                    .nav-link:hover:not(.active) { background: rgba(255, 255, 255, 0.03); color: white; }
        
                    ::-webkit-scrollbar { width: 4px; }
                    ::-webkit-scrollbar-track { background: transparent; }
                    ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        
                    .archive-card { background: #0a0a0a; border: 1px solid #27272a; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
                    .archive-card:hover { border-color: rgba(57, 255, 20, 0.5); transform: translateY(-4px); box-shadow: 0 10px 30px -15px rgba(57, 255, 20, 0.2); }
        
                    .hud-corner { position: absolute; width: 8px; height: 8px; border-color: #39FF14; opacity: 0.4; }
                </style>
            </head>
            <body class="flex h-screen w-screen overflow-hidden">

                <aside id="sidebar" class="w-64 border-r border-[#27272a] bg-[#0a0a0a] flex flex-col transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 shrink-0 h-full"></aside>

                <main class="flex-1 flex flex-col overflow-hidden relative">
                    <header class="h-16 flex items-center px-8 border-b border-border bg-background justify-between shrink-0">
                        <span class="text-[10px] font-mono uppercase tracking-[0.3em] text-primary font-bold">Secure Asset Archive</span>
                        <div class="flex items-center gap-6">
                            <div class="relative group">
                                <iconify-icon icon="solar:magnifer-linear" class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500 group-focus-within:text-primary transition-colors"></iconify-icon>
                                <input type="text" id="searchDj" placeholder="SEARCH DATABASE..." class="bg-black border border-[#27272a] rounded-full pl-10 pr-6 py-2 text-[10px] font-mono font-bold text-white uppercase outline-none focus:border-primary w-64 transition-all">
                            </div>
                        </div>
                    </header>

                    <div class="flex-1 p-8 overflow-y-auto no-scrollbar">
                        <div class="max-w-7xl mx-auto space-y-8 pb-24">
                            <div class="flex items-center justify-between mb-4 border-b border-white/5 pb-4">
                                <div>
                                    <h2 class="text-xs font-mono text-zinc-500 uppercase tracking-[0.4em]">Vault / Storage</h2>
                                    <p class="text-[9px] text-zinc-600 mt-1 uppercase tracking-widest">Total Master Files: <span id="vault-count" class="text-primary">0</span></p>
                                </div>
                            </div>

                            <div id="archive-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                </div>
                        </div>
                    </div>

                    <div class="fixed bottom-0 left-0 w-full h-10 bg-black border-t border-[#27272a] flex items-center justify-between px-6 z-50">
                        <div class="flex items-center gap-4 text-[9px] font-mono text-zinc-600 uppercase tracking-widest">
                            <span>LOCAL / ASSETS V2.4.0</span>
                            <span class="text-zinc-800">//</span>
                            <span class="text-primary/70">CONNECTED</span>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse shadow-[0_0_8px_#39FF14]"></span>
                            <span class="text-[9px] font-mono text-zinc-400 uppercase tracking-widest">System Operational</span>
                        </div>
                    </div>
                </main>

                <script>
                    async function loadArchive() {
                        const cloudName = 'dso3xwno0';
                        const tagName = 'venue_recording';
                        try {
                            const response = await fetch(`https://res.cloudinary.com/${cloudName}/video/list/${tagName}.json`);
                            const data = await response.json();
                
                            document.getElementById('vault-count').innerText = data.resources.length;
                            const grid = document.getElementById('archive-grid');
                
                            grid.innerHTML = data.resources.map(video => {
                                const parts = video.public_id.replace('venue_masters/', '').split('_');
                                const dj = parts[0] ? parts[0].toUpperCase() : "ARTIST";
                                const date = parts[1] || video.created_at.split('T')[0];
                                const shot = (parts[2] || "MASTER").toUpperCase();

                                return `
                                <div class="archive-card rounded-2xl overflow-hidden group">
                                    <div class="aspect-video bg-black relative overflow-hidden">
                                        <div class="hud-corner top-3 left-3 border-t border-l"></div>
                                        <div class="hud-corner top-3 right-3 border-t border-r"></div>
                            
                                        <video src="https://res.cloudinary.com/${cloudName}/video/upload/q_auto:low,w_400/${video.public_id}.mp4" 
                                               class="w-full h-full object-cover opacity-40 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700" 
                                               muted loop onmouseover="this.play()" onmouseout="this.pause()"></video>
                            
                                        <div class="absolute bottom-3 left-3 bg-black/60 backdrop-blur px-2 py-1 border border-white/10 rounded text-[8px] font-mono text-white uppercase">
                                            ${video.duration ? Math.floor(video.duration/60) + 'm' : 'RAW'} // ${video.format}
                                        </div>
                                    </div>
                                    <div class="p-5 space-y-4">
                                        <div>
                                            <div class="flex items-center justify-between mb-1">
                                                <h3 class="text-sm font-bold uppercase text-white tracking-tight">${dj}</h3>
                                                <span class="text-[8px] px-1.5 py-0.5 rounded border border-primary/30 text-primary font-mono font-bold uppercase">${shot}</span>
                                            </div>
                                            <p class="text-[9px] font-mono text-zinc-500 uppercase tracking-widest">${date}</p>
                                        </div>
                            
                                        <a href="https://res.cloudinary.com/${cloudName}/video/upload/fl_attachment/${video.public_id}.${video.format}" 
                                           class="flex items-center justify-center gap-2 w-full bg-zinc-900 border border-zinc-800 hover:bg-primary hover:text-black hover:border-primary py-3 rounded-xl font-mono text-[10px] font-bold uppercase transition-all">
                                           <iconify-icon icon="solar:cloud-download-linear" class="text-lg"></iconify-icon>
                                           Download Master
                                        </a>
                                    </div>
                                </div>
                                `;
                            }).join('');
                        } catch (e) {
                            console.error("Signal loss: Archive unreachable", e);
                        }
                    }
                    loadArchive();
                </script>
            </body>
            </html>
