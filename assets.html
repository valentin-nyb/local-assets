    <script>

        let cloudAssets = [];

        const CONFIG = {
            // Temporarily use default Worker URL for testing
            WORKER_URL: "https://local-assets-worker.smackeprang-v.workers.dev", 
            API_KEY: "your_secret_key_here"
        };

        document.addEventListener('DOMContentLoaded', function() {
            const ingestDate = document.getElementById('ingest-date');
            try {
                if (typeof flatpickr === 'function') {
                    flatpickr(ingestDate, {
                        defaultDate: "today",
                        dateFormat: "d M Y",
                        theme: "dark",
                        disableMobile: true,
                        allowInput: false,
                        appendTo: document.body,
                        clickOpens: true
                    });
                    console.log('flatpickr initialized');
                } else {
                    console.warn('flatpickr not loaded, falling back to native');
                    if (ingestDate) {
                        ingestDate.type = 'date';
                        ingestDate.value = new Date().toISOString().slice(0, 10);
                    }
                }
            } catch (e) {
                console.error('flatpickr init error:', e);
                if (ingestDate) {
                    ingestDate.type = 'date';
                    ingestDate.value = new Date().toISOString().slice(0, 10);
                }
            }

            fetchCloudLibrary();
            setupUploadHandler();
        });

   function setupUploadHandler() {
    const uploadBtn = document.getElementById('upload-btn');
    const fileVideo = document.getElementById('file-video');
    const fileAudio = document.getElementById('file-audio');
    const fileSocial = document.getElementById('file-social');
    const fileMarketing = document.getElementById('file-marketing');

    // UI State Handler
    function setCardSelected(cardId, isSelected) {
        const card = document.getElementById(cardId);
        if (!card) return;
        const icon = card.querySelector('.upload-card-icon');
        const label = card.querySelector('.upload-card-label');

        if (isSelected) {
            card.classList.add('border-primary', 'bg-primary/10');
            if (icon) icon.classList.replace('text-zinc-600', 'text-primary');
        } else {
            card.classList.remove('border-primary', 'bg-primary/10');
            if (icon) icon.classList.replace('text-primary', 'text-zinc-600');
        }
    }

    fileVideo.addEventListener('change', () => setCardSelected('card-video', fileVideo.files.length > 0));
    fileAudio.addEventListener('change', () => setCardSelected('card-audio', fileAudio.files.length > 0));
    fileSocial.addEventListener('change', () => setCardSelected('card-social', fileSocial.files.length > 0));
    fileMarketing.addEventListener('change', () => setCardSelected('card-marketing', fileMarketing.files.length > 0));

    async function fetchWithRetry(url, options, retries = 3) {
        for (let attempt = 1; attempt <= retries; attempt++) {
            try {
                return await fetch(url, options);
            } catch (err) {
                if (attempt === retries) throw err;
                await new Promise(r => setTimeout(r, 1000 * attempt));
            }
        }
    }

    async function uploadFile(file, path, type) {
        const presignRes = await fetchWithRetry(
            `${CONFIG.WORKER_URL}/presign-upload?file=${encodeURIComponent(path)}&type=${encodeURIComponent(type)}`,
            { method: 'GET', headers: { 'x-api-key': CONFIG.API_KEY } }
        );
        
        if (!presignRes.ok) throw new Error('Presign failed');
        const { url: presignedUrl } = await presignRes.json();

        const uploadRes = await fetch(presignedUrl, {
            method: 'PUT',
            body: file,
            headers: { 'Content-Type': type }
        });
        if (!uploadRes.ok) throw new Error('R2 upload failed');
        return true;
    }

    // THIS MUST BE INSIDE setupUploadHandler
    uploadBtn.onclick = async function() {
        const djName = document.getElementById('ingest-name').value.trim();
        const date = document.getElementById('ingest-date').value.trim();

        if (!djName || !date) {
            alert('Please fill in DJ NAME and DATE');
            return;
        }

        const uploadQueue = [];
        if (fileVideo.files.length > 0) uploadQueue.push({ file: fileVideo.files[0], type: '4K_LONG_FORM' });
        if (fileAudio.files.length > 0) uploadQueue.push({ file: fileAudio.files[0], type: 'audio' });

        uploadBtn.disabled = true;
        uploadBtn.textContent = 'UPLOADING...';

        try {
            const safeDj = djName.toUpperCase().replace(/\s+/g, '_');
            
            for (const item of uploadQueue) {
                const ext = item.file.name.split('.').pop();
                // Matching your rclone folder structure exactly
                const path = `venue_masters/${safeDj}/${item.type}/${item.file.name}`;
                await uploadFile(item.file, path, item.file.type);
            }

            alert('Session Ingested Successfully');
            fetchCloudLibrary(); 
        } catch (err) {
            alert('Upload failed: ' + err.message);
        } finally {
            uploadBtn.disabled = false;
            uploadBtn.textContent = 'PROCESS & INGEST FULL SESSION';
        }
    };
} // This closes the entire handler properly.
