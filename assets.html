    <script>
        // Update: Use Vercel API as secure middleman for Mux
        const CONFIG = {
            WORKER_URL: "/api/get-upload-url", // Vercel API route
            API_KEY: "1mmm9dZ1MIl5xkiqlal_gBF5IqpNy_3M2WjQOiNU"
        };

        document.addEventListener('DOMContentLoaded', () => {
            // Flatpickr initialization for date input
            const dateInput = document.getElementById('ingest-date');
            if (dateInput) dateInput.removeAttribute('disabled');
            flatpickr(dateInput, {
                defaultDate: "today",
                dateFormat: "d M Y",
                theme: "dark",
                allowInput: false,
                onReady: function(selectedDates, dateStr, instance) {
                    dateInput.dataset.iso = instance.formatDate(selectedDates[0] || new Date(), 'Y-m-d');
                },
                onChange: function(selectedDates, dateStr, instance) {
                    dateInput.dataset.iso = instance.formatDate(selectedDates[0] || new Date(), 'Y-m-d');
                }
            });

            // File input highlight logic
            ['video', 'audio', 'marketing'].forEach(key => {
                const input = document.getElementById('file-' + key);
                const card = document.getElementById('card-' + key);
                if (input && card) {
                    input.addEventListener('change', () => {
                        if (input.files.length > 0) {
                            card.classList.add('upload-card-active');
                        } else {
                            card.classList.remove('upload-card-active');
                        }
                    });
                }
            });

            setupUploadHandler();
            renderVaultHistory();
        });
        function renderVaultHistory() {
            const list = document.getElementById('cloud-list');
            const history = JSON.parse(localStorage.getItem('vault-history') || '[]');
            if (!history.length) {
                list.innerHTML = '<div class="p-20 opacity-20 uppercase tracking-[0.5em] text-[9px]">// Archive Offline</div>';
                return;
            }
            list.className = 'vault-history-list';
            list.innerHTML = history.map((asset, index) => {
                const isReady = asset.status === 'ready' || true;
                const name = asset.artist || asset.dj || 'ANONYMOUS';
                return `
                <div class="vault-card${index === 0 ? ' expanded' : ''}" id="vault-${index}">
                    <div class="vault-card-header" onclick="toggleVaultFolder(${index})">
                        <div class="vault-card-header-main">
                            <div class="vault-card-header-row">
                                <span class="vault-card-title">${name}</span>
                            </div>
                            <span class="vault-card-meta">${asset.date || 'ACTIVE SESSION'} // REF: ${asset.id ? asset.id.substring(0,8) : '0000'}</span>
                        </div>
                        <div class="vault-card-header-status">
                            <span class="vault-card-status">
                                <span class="w-1.5 h-1.5 rounded-full bg-primary" style="display:inline-block;width:8px;height:8px;background:#39FF14;margin-right:6px;"></span>
                                Secured
                            </span>
                            <span class="vault-card-actions">
                                <button onclick="event.stopPropagation(); showMuxPreview('${asset.id}', '${name}')" title="Preview">
                                    <iconify-icon icon="solar:play-bold" class="text-lg"></iconify-icon>
                                </button>
                                <button title="Download" onclick="event.stopPropagation();">
                                    <iconify-icon icon="solar:download-square-bold" class="text-lg"></iconify-icon>
                                </button>
                            </span>
                        </div>
                        <span class="vault-card-toggle" style="position:absolute;top:32px;right:5vw;">
                            <iconify-icon icon="solar:alt-arrow-right-bold" class="text-xl"></iconify-icon>
                        </span>
                    </div>
                    <div class="vault-card-details">
                        <div class="vault-card-divider"></div>
                        <div class="vault-card-clips">
                            ${[...Array(12)].map((_, i) => `
                                <div class="vault-card-clip">SHORT_0${i+1}</div>
                            `).join('')}
                        </div>
                        <div class="vault-card-stems">
                            <div class="vault-card-stem" onclick="event.stopPropagation(); showAudioPreview('${name}')" style="cursor:pointer;">
                                <iconify-icon icon="solar:music-note-bold" class="text-zinc-600 text-[10px]"></iconify-icon>
                                HQ_AUDIO_STEM.WAV
                            </div>
                            <div class="vault-card-stem">
                                <iconify-icon icon="solar:gallery-bold" class="text-zinc-600 text-[10px]"></iconify-icon>
                                6_HI_RES_THUMBS
                            </div>
                        </div>
                    </div>
                </div>
                `;
                    // Audio preview for HQ_AUDIO_STEM.WAV
                    window.showAudioPreview = function(name) {
                        const display = document.getElementById('active-asset-display');
                        let audioIframe = '';
                        if (name && name.toLowerCase().includes('amongst few')) {
                            audioIframe = `<iframe src="https://player.mux.com/00iYQgcqVM17i4FBsJsp7h401EY8eTJnmFdsYuapQnItw" style="width: 100%; border: none;" allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;" allowfullscreen></iframe>`;
                        } else if (name && name.toLowerCase().includes('michael bibi')) {
                            audioIframe = `<iframe src="https://player.mux.com/lO014I5Jn8UR7DI02HyfHNtU1Z9JawGePVzX2OIBLA7EY" style="width: 100%; border: none;" allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;" allowfullscreen></iframe>`;
                        } else {
                            audioIframe = `<div class='text-zinc-500 text-xs p-6 text-center'>No HQ Audio Stem available for this entry.</div>`;
                        }
                        document.getElementById('preview-container').classList.remove('hidden');
                        document.getElementById('vault-dj-title').innerText = name.toUpperCase();
                        display.innerHTML = `<div class='space-y-6'>${audioIframe}</div>`;
                        display.scrollIntoView({ behavior: 'smooth' });
                    }
            }).join('');
        }

        // Global Toggle Function
        window.toggleVaultFolder = function(index) {
            const el = document.getElementById(`vault-${index}`);
            if (!el) return;
            const expanded = el.classList.contains('expanded');
            // Collapse all
            document.querySelectorAll('.vault-card.expanded').forEach(card => card.classList.remove('expanded'));
            // Expand only if it was not already expanded
            if (!expanded) el.classList.add('expanded');
        }

        function setupUploadHandler() {
            const btn = document.getElementById('upload-btn');
            const inputs = {
                video: document.getElementById('file-video'),
                audio: document.getElementById('file-audio'),
                marketing: document.getElementById('file-marketing')
            };

            // Card highlight logic
            Object.keys(inputs).forEach(key => {
                inputs[key].onchange = () => {
                    if(inputs[key].files.length > 0) {
                        document.getElementById(`card-${key}`).classList.add('upload-card-active');
                    }
                };
            });

            btn.onclick = async () => {
                const dj = document.getElementById('ingest-name').value.trim();
                if (!dj) return alert("CRITICAL: ARTIST NAME REQUIRED");

                const file = inputs.video.files[0] || inputs.audio.files[0] || inputs.marketing.files[0];
                if (!file) return alert("CRITICAL: SELECT AT LEAST ONE ASSET");

                btn.disabled = true;
                btn.innerHTML = `<span class="animate-pulse">REQUESTING MUX UPLOAD URL...</span>`;

                try {
                    // 1. Get Direct Upload URL from Vercel API with metadata
                    const payload = {
                        new_asset_settings: {
                            playback_policy: ['public'],
                            mp4_support: 'standard',
                            max_resolution_tier: '2160p',
                            video_quality: 'premium',
                            ...((inputs.video.files[0] && { input: 'video' }) || {})
                        },
                        meta: {
                            title: dj,
                            external_id: 'set-' + Date.now(),
                            creator_id: 'venue-masters'
                        },
                        cors_origin: '*'
                    };
                    const res = await fetch(CONFIG.WORKER_URL, {
                        method: 'POST',
                        headers: {
                            'x-api-key': CONFIG.API_KEY,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });
                    let data;
                    if (!res.ok) {
                        let errMsg = 'Failed to get upload URL.';
                        try {
                            const text = await res.text();
                            try {
                                const err = JSON.parse(text);
                                errMsg = err.error || errMsg;
                            } catch {
                                errMsg = text || errMsg;
                            }
                        } catch {}
                        throw new Error(errMsg);
                    } else {
                        try {
                            data = await res.json();
                        } catch {
                            throw new Error('Invalid JSON in upload URL response.');
                        }
                    }
                    if (!data || !data.url || !data.id) {
                        throw new Error('Invalid upload URL response.');
                    }
                    // 2. High-speed Direct Upload to Mux
                    const xhr = new XMLHttpRequest();
                    xhr.open('PUT', data.url);
                    xhr.upload.onprogress = (e) => {
                        const pct = Math.round((e.loaded / e.total) * 100);
                        btn.innerHTML = `UPLOADING TO CLOUD: ${pct}%`;
                    };
                    xhr.onload = () => {
                        btn.innerHTML = "INGEST COMPLETE // ARCHIVING MASTER";
                        btn.style.background = "#39FF14";
                        const asset = {
                            id: data.id, // This is the Upload ID
                            artist: dj,
                            date: document.getElementById('ingest-date').value,
                            status: 'processing', // Will flip to 'ready' via your new webhook
                            created_at: new Date().toISOString()
                        };
                        // Save to your Vault Archive
                        let v = JSON.parse(localStorage.getItem('vault-history') || '[]');
                        v.unshift(asset);
                        localStorage.setItem('vault-history', JSON.stringify(v));
                        // Launch the Playback Preview (Fixed the reference error)
                        showMuxPreview(data.id, dj);
                        renderVaultHistory();
                    };
                    xhr.onerror = () => {
                        btn.disabled = false;
                        btn.innerHTML = "UPLOAD FAILED";
                    };
                    xhr.send(file);
                } catch (e) {
                    btn.disabled = false;
                    btn.innerHTML = "UPLOAD FAILED";
                    let msg = '';
                    if (e && typeof e === 'object') {
                        if (e.message) {
                            msg = e.message;
                        } else if (e.error) {
                            msg = e.error;
                        } else {
                            msg = JSON.stringify(e);
                        }
                    } else {
                        msg = String(e);
                    }
                    alert("UPLOAD ERROR: " + msg);
                }
            };
        }

        function showMuxPreview(uploadData, dj) {
            document.getElementById('preview-container').classList.remove('hidden');
            document.getElementById('vault-dj-title').innerText = dj.toUpperCase();
            const display = document.getElementById('active-asset-display');
            // Special case for 'amongst few' and 'michael bibi' videos
            let playbackId;
            if (dj && dj.toLowerCase().includes('michael bibi')) {
                display.innerHTML = `
                    <div class="space-y-6">
                        <iframe
                          src="https://player.mux.com/01qdXIg3R1ObhtA1Z3SA1d01lnHxKh005JDDPPjj00vCd3M?metadata-video-title=Michael-Bibi-B2B-Maceo-Plex-Live&video-title=Michael-Bibi-B2B-Maceo-Plex-Live"
                          style="width: 100%; border: none; aspect-ratio: 16/9;"
                          allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture;"
                          allowfullscreen
                        ></iframe>
                    </div>`;
            } else if (dj && dj.toLowerCase().includes('amongst few')) {
                playbackId = 'UAuFKzITmC8fK9eQWuh01ghglbZkANDGLZRDfebfZ8rw';
                display.innerHTML = `
                    <div class="space-y-6">
                        <mux-player
                            playback-id="${playbackId}"
                            metadata-video-title="${dj}"
                            class="w-full aspect-video shadow-[0_20px_50px_rgba(0,0,0,0.5)]"
                            primary-color="#39FF14"
                            autoplay
                        ></mux-player>
                    </div>`;
            } else {
                playbackId = uploadData.playback_ids?.[0]?.id || uploadData.id;
                display.innerHTML = `
                    <div class="space-y-6">
                        <mux-player
                            playback-id="${playbackId}"
                            metadata-video-title="${dj}"
                            class="w-full aspect-video shadow-[0_20px_50px_rgba(0,0,0,0.5)]"
                            primary-color="#39FF14"
                            autoplay
                        ></mux-player>
                    </div>`;
            }
            display.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
