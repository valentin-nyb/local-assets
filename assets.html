<script>
    // Toggle Sidebar for Mobile
    window.toggleSidebar = () => {
        const sb = document.getElementById('sidebar');
        const ov = document.getElementById('sidebar-overlay');
        sb.classList.toggle('-translate-x-full');
        ov.classList.toggle('hidden');
        setTimeout(() => ov.classList.toggle('opacity-0'), 10);
    };

    window.markActive = (type) => document.getElementById('node-' + type)?.classList.add('active');

    // This is the main function that runs when the page loads.
    window.onload = function() {
        // Initialize the date picker and load existing assets.
        flatpickr("#ingest-date", { defaultDate: "today", theme: "dark" });
        loadVault(); 
        
        const uploadBtn = document.getElementById('upload-btn');
        
        // This is the single, correct event handler for the upload button.
        uploadBtn.onclick = async function() {
            const projectName = document.getElementById('ingest-name').value;
            const file = document.getElementById('file-video').files[0];
        
            if (!file || !projectName) {
                return alert("Artist Name and a video file are required.");
            }
        
            uploadBtn.disabled = true;
            uploadBtn.innerHTML = "STEP 1: CREATING PROJECT...";
        
            try {
                // --- STEP 1: Create the Project in your database ---
                const projectResponse = await fetch('/api/create-project', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ projectName: projectName })
                });
        
                if (!projectResponse.ok) throw new Error('Server failed to create project.');
                const projectData = await projectResponse.json();
                if (!projectData.projectId) throw new Error('Project ID was not returned from server.');
                
                uploadBtn.innerHTML = "STEP 2: REQUESTING UPLOAD URL...";
        
                // --- STEP 2: Get the Mux Upload URL, now with the projectId ---
                const uploadUrlResponse = await fetch('/api/get-upload-url', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ projectId: projectData.projectId })
                });
        
                if (!uploadUrlResponse.ok) throw new Error('Server failed to provide an upload URL.');
                const uploadData = await uploadUrlResponse.json();
                if (!uploadData.url) throw new Error('Upload URL was not returned from server.');
        
                // --- STEP 3: Upload the file directly to Mux ---
                const xhr = new XMLHttpRequest();
                xhr.open('PUT', uploadData.url);
                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const pct = Math.round((e.loaded / e.total) * 100);
                        uploadBtn.innerHTML = `UPLOADING TO VAULT: ${pct}%`;
                    }
                };
                xhr.onload = () => {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        uploadBtn.innerHTML = "SENT TO VAULT";
                        uploadBtn.style.background = "#39FF14";
                        setTimeout(loadVault, 5000);
                    } else {
                        throw new Error(`Mux upload failed with status: ${xhr.status}`);
                    }
                };
                xhr.onerror = () => {
                    throw new Error('A network error occurred during the file upload.');
                };
                xhr.send(file);
        
            } catch (err) {
                alert("PROCESS ERROR: " + err.message);
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = "INGEST - LOCAL/SESSION"; // Reset button
                uploadBtn.style.background = ""; // Reset style
            }
        };
    };

    // This function fetches and displays the list of assets.
    async function loadVault() {
        const list = document.getElementById('cloud-list');
        try {
            const res = await fetch('/api/list-assets');
            const data = await res.json();

            if (data.error) {
                list.innerHTML = `<p class="text-red-500 font-mono text-[10px] uppercase">VAULT ERROR: ${data.error}</p>`;
                return;
            }

            const assets = (Array.isArray(data) ? data : (data.data || [])).filter(a =>
                a.tracks?.some(t => t.type === 'video') &&
                a.passthrough?.startsWith('source_for_project_') // Only show source assets
            );

            if (assets.length === 0) {
                list.innerHTML = `<p class="text-zinc-500 font-mono text-[10px] uppercase">VAULT EMPTY // NO PROJECTS FOUND</p>`;
                return;
            }

            // This block is now corrected to use the variables properly.
            list.innerHTML = assets.map((asset, i) => {
                const pid = asset.playback_ids?.[0]?.id;
                const status = asset.status;
                const isReady = status === 'ready';
                const projectId = asset.passthrough.replace('source_for_project_', '');

                // For now, we'll derive the project name from the passthrough.
                // A better approach would be to fetch this from your own database.
                const projectName = asset.passthrough.replace('source_for_project_', 'Project ');

                return `
                <div class="vault-card ${isReady ? '' : 'opacity-50'}" id="vault-">
                    <div class="vault-card-header" onclick="toggleVaultFolder(, '')">
                        <div>
                            <h4 class="text-2xl font-black italic uppercase"></h4>
                            <span class="text-[8px] font-mono ${isReady ? 'text-primary' : 'text-zinc-500'} uppercase">
                                ${status.toUpperCase()} // ${new Date(asset.created_at * 1000).toLocaleDateString()}
                            </span>
                        </div>
                    </div>
                    <div class="asset-tray" id="tray-">
                        <!-- Child assets will be loaded here -->
                        <div class="flex gap-4 pt-4">
                            ${pid ? `<button class="px-4 py-2 bg-zinc-900 border border-zinc-800 rounded-lg text-[9px] font-black hover:border-primary" 
                                onclick="event.stopPropagation(); showPreview('')">PLAY SESSION</button>` : ''}
                            <span class="px-4 py-2 bg-zinc-900 border border-zinc-800 rounded-lg text-[9px] font-black text-primary">4K MASTER</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        } catch (e) {
            list.innerHTML = `<p class="text-red-500 font-mono text-[10px] uppercase">VAULT OFFLINE: ${e.message}</p>`;
        }
    }

    // This function shows the video preview.
    window.showPreview = (pid) => {
        const display = document.getElementById('active-asset-display');
        document.getElementById('preview-container').classList.remove('hidden');
        // Correctly constructs the iframe URL with the playback ID.
        display.innerHTML = `<iframe src="https://player.mux.com/" style="width:100%;border:none;aspect-ratio:16/9;" allowfullscreen></iframe>`;
        display.scrollIntoView({ behavior: 'smooth' });
    };

    // This function expands the vault folder.
    window.toggleVaultFolder = (i, projectId) => {
        const card = document.getElementById('vault-' + i);
        card.classList.toggle('expanded');
        // Here you would add logic to fetch and display the child assets for the given projectId
        console.log(`Toggled folder for project: `);
    };
</script>
