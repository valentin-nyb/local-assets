<body class="bg-background text-white h-screen w-screen flex overflow-hidden font-sans">

    <button onclick="toggleSidebar()" class="md:hidden fixed left-0 top-1/2 -translate-y-1/2 z-50 bg-primary/90 backdrop-blur-md text-black py-8 px-1.5 rounded-r-lg shadow-[0_0_15px_rgba(57,255,20,0.2)] active:scale-95 transition-all flex items-center justify-center border-y border-r border-primary">
        <span class="sleek-flap">MENU</span>
        window.onload = function() {
            // Initialize the styled calendar
            flatpickr("#ingest-date", { 
                defaultDate: "today", 
                dateFormat: "d M Y",
                disableMobile: "true"
            });
            fetchCloudLibrary();
            // 1. ADD THIS LINE to initialize the button
            setupUploadHandler(); 
        };

        // ... (Keep your existing fetchCloudLibrary code here) ...

        async function fetchCloudLibrary() {
            try {
                const response = await fetch(`https://res.cloudinary.com/dso3xwno0/video/list/venue_recording.json`);
                const data = await response.json();
                cloudAssets = data.resources.map(res => {
                    const parts = res.public_id.replace('venue_masters/', '').split('_');
                    return {
                        dj: parts[0] ? parts[0].toUpperCase() : "MICHAEL",
                        date: parts[1] || res.created_at.split('T')[0],
                        shot: parts[2] || "BIBI",
                        url: `https://res.cloudinary.com/dso3xwno0/video/upload/${res.public_id}.${res.format}`,
                        format: res.format.toUpperCase()
                    };
                });
                renderList();
            } catch (e) { console.error(e); }
        }

        function renderList() {
            const list = document.getElementById('cloud-list');
            list.innerHTML = '';
            cloudAssets.forEach(item => {
                const row = document.createElement('div');
                row.className = "flex items-center justify-between p-4 bg-card border border-zinc-800 rounded-2xl group cursor-pointer hover:border-primary/40 transition-all";
                row.innerHTML = `
                    <div class="flex items-center gap-4 min-w-0 flex-1" onclick="playPreview('${item.url}')">
                        <div class="w-12 h-12 bg-zinc-900 flex items-center justify-center rounded-xl text-primary shrink-0 shadow-lg"><iconify-icon icon="solar:play-bold" class="text-xl"></iconify-icon></div>
                        <div class="min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <p class="text-sm font-black uppercase text-white truncate">${item.dj}</p>
                                <span class="text-[7px] px-1.5 py-0.5 rounded bg-primary text-black font-black font-mono uppercase">${item.shot}</span>
                            </div>
                            <p class="text-[9px] font-mono text-zinc-500 uppercase tracking-widest">FABRIC LONDON // ${item.date} // ${item.format}</p>
                        </div>
                    </div>
                    <a href="${item.url}" download class="w-10 h-10 flex items-center justify-center text-zinc-600 hover:text-primary transition-colors">
                        <iconify-icon icon="solar:cloud-download-bold" class="text-2xl"></iconify-icon>
                    </a>`;
                list.appendChild(row);
            });
        }

        function playPreview(url) {
            const container = document.getElementById('video-preview-container');
            const player = document.getElementById('preview-player');
            container.classList.remove('hidden');
            player.src = url;
            player.play();
            container.scrollIntoView({ behavior: 'smooth' });
        }

        // 2. PASTE THIS ENTIRE FUNCTION
        function setupUploadHandler() {
            const uploadBtn = document.getElementById('upload-btn');
            const fileInput = document.getElementById('hidden-file-input');
            // Trigger hidden file picker when the neon button is clicked
            uploadBtn.addEventListener('click', () => {
                fileInput.click();
            });
            // When a file is selected, start the upload process
            fileInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const djName = document.getElementById('ingest-name').value.trim();
                const date = document.getElementById('ingest-date').value.trim();
                const shot = document.getElementById('ingest-shot').value;
                if (!djName || !date) {
                    alert('SYSTEM HALT: PLEASE ENTER DJ NAME AND DATE.');
                    return;
                }
                // UI FEEDBACK: Change to "Transmitting" state
                const originalText = uploadBtn.innerHTML;
                uploadBtn.disabled = true;
                uploadBtn.innerHTML = '<iconify-icon icon="solar:server-square-update-linear" class="animate-spin text-lg align-middle mr-2"></iconify-icon> TRANSMITTING TO VAULT...';
                uploadBtn.classList.remove('bg-[#39FF14]', 'text-black', 'shadow-[0_0_20px_rgba(57,255,20,0.3)]');
                uploadBtn.classList.add('bg-[#050505]', 'text-[#39FF14]', 'border', 'border-[#39FF14]');
                try {
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('upload_preset', 'venue_recording');
                    // Construct the perfect file name format
                    const safeDj = djName.toLowerCase().replace(/[^a-z0-9]/g, '_');
                    const safeDate = date.replace(/\s+/g, '_');
                    formData.append('public_id', `venue_masters/${safeDj}_${safeDate}_${shot.toLowerCase()}`);
                    // Send to Cloudinary
                    const response = await fetch('https://api.cloudinary.com/v1_1/dso3xwno0/video/upload', {
                        method: 'POST',
                        body: formData
                    });
                    if (response.ok) {
                        // Reset form on success
                        document.getElementById('ingest-name').value = '';
                        fileInput.value = '';
                        // Update UI to success
                        uploadBtn.innerHTML = '<iconify-icon icon="solar:check-circle-bold" class="text-lg align-middle mr-2"></iconify-icon> INGEST COMPLETE';
                        uploadBtn.classList.remove('bg-[#050505]', 'border', 'text-[#39FF14]');
                        uploadBtn.classList.add('bg-white', 'text-black');
                        // Refresh the master list below
                        fetchCloudLibrary();
                        // Revert button after 3 seconds
                        setTimeout(() => resetButton(uploadBtn, originalText), 3000);
                    } else {
                        throw new Error('Upload failed');
                    }
                } catch (err) {
                    console.error('Upload Error:', err);
                    alert('SIGNAL LOSS: UPLOAD FAILED.');
                    resetButton(uploadBtn, originalText);
                }
            });
        }

        function resetButton(btn, text) {
            btn.disabled = false;
            btn.innerHTML = text;
            btn.classList.add('bg-[#39FF14]', 'text-black', 'shadow-[0_0_20px_rgba(57,255,20,0.3)]');
            btn.classList.remove('bg-[#050505]', 'bg-white', 'border', 'border-[#39FF14]', 'text-[#39FF14]');
        }
    </script>
        };

        function setupUploadHandler() {
            const uploadBtn = document.getElementById('upload-btn');
            const fileInput = document.getElementById('hidden-file-input');
            
            uploadBtn.onclick = function() {
                fileInput.click();
            };
            
            fileInput.onchange = async function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const djName = document.getElementById('ingest-name').value.trim();
                const date = document.getElementById('ingest-date').value.trim();
                const shot = document.getElementById('ingest-shot').value;
                
                if (!djName || !date) {
                    alert('Please fill in DJ NAME and DATE');
                    return;
                }
                
                uploadBtn.disabled = true;
                uploadBtn.textContent = 'UPLOADING...';
                
                try {
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('upload_preset', 'venue_recording');
                    formData.append('public_id', `venue_masters/${djName.toLowerCase()}_${date.replace(/\s+/g, '_')}_${shot.toLowerCase()}`);
                    
                    const response = await fetch('https://api.cloudinary.com/v1_1/dso3xwno0/video/upload', {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (response.ok) {
                        alert('Upload successful!');
                        document.getElementById('ingest-name').value = '';
                        document.getElementById('ingest-date').value = '';
                        fileInput.value = '';
                        fetchCloudLibrary();
                    } else {
                        alert('Upload failed. Please try again.');
                    }
                } catch (err) {
                    console.error('Upload error:', err);
                    alert('Upload error: ' + err.message);
                } finally {
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = 'START MASTER UPLOAD';
                }
            };
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.add('opacity-100'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

                row.className = "flex items-center justify-between p-4 bg-card border border-zinc-800 rounded-2xl group cursor-pointer hover:border-primary/40 transition-all";
                row.innerHTML = `
                    <div class="flex items-center gap-4 min-w-0 flex-1" onclick="playPreview('${item.url}')">
                        <div class="w-12 h-12 bg-zinc-900 flex items-center justify-center rounded-xl text-primary shrink-0 shadow-lg"><iconify-icon icon="solar:play-bold" class="text-xl"></iconify-icon></div>
                        <div class="min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                <p class="text-sm font-black uppercase text-white truncate">${item.dj}</p>
