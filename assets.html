    <script>
        let cloudAssets = [];
        const CONFIG = {
            WORKER_URL: '/api',
            WORKER_FALLBACK_URL: 'https://local-assets-worker.smackeprang-v.workers.dev'
        };

        window.onload = function() {
            flatpickr("#ingest-date", { defaultDate: "today", dateFormat: "d M Y" });
            fetchCloudLibrary();
            setupUploadHandler();
        };

        function setupUploadHandler() {
            const uploadBtn = document.getElementById('upload-btn');
            const MULTIPART_THRESHOLD_BYTES = 3 * 1024 * 1024;
            const MULTIPART_CHUNK_BYTES = 1 * 1024 * 1024;
            const MULTIPART_MAX_RETRIES = 3;
            const REQUEST_TIMEOUT_MS = 60000;

            const fileVideo = document.getElementById('file-video');
            const fileAudio = document.getElementById('file-audio');
            const fileSocial = document.getElementById('file-social');
            const fileMarketing = document.getElementById('file-marketing');

            function setCardSelected(cardId, isSelected) {
                const card = document.getElementById(cardId);
                if (!card) return;

                const icon = card.querySelector('.upload-card-icon');
                const label = card.querySelector('.upload-card-label');

                if (isSelected) {
                    card.classList.add('border-primary', 'bg-primary/10', 'shadow-[0_0_20px_rgba(57,255,20,0.12)]');
                    card.classList.remove('border-zinc-800', 'bg-black');
                    if (icon) icon.classList.replace('text-zinc-600', 'text-primary');
                    if (label) label.classList.replace('text-zinc-500', 'text-primary');
                } else {
                    card.classList.remove('border-primary', 'bg-primary/10', 'shadow-[0_0_20px_rgba(57,255,20,0.12)]');
                    card.classList.add('border-zinc-800', 'bg-black');
                    if (icon) icon.classList.replace('text-primary', 'text-zinc-600');
                    if (label) label.classList.replace('text-primary', 'text-zinc-500');
                }
            }

            fileVideo.addEventListener('change', () => setCardSelected('card-video', fileVideo.files.length > 0));
            fileAudio.addEventListener('change', () => setCardSelected('card-audio', fileAudio.files.length > 0));
            fileSocial.addEventListener('change', () => setCardSelected('card-social', fileSocial.files.length > 0));
            fileMarketing.addEventListener('change', () => setCardSelected('card-marketing', fileMarketing.files.length > 0));

            async function fetchWithTimeout(resource, options = {}, timeoutMs = REQUEST_TIMEOUT_MS) {
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), timeoutMs);

                try {
                    return await fetch(resource, { ...options, signal: controller.signal });
                } catch (err) {
                    if (err?.name === 'AbortError') {
                        throw new Error(`Request timed out after ${Math.round(timeoutMs / 1000)}s`);
                    }
                    throw err;
                } finally {
                    clearTimeout(timer);
                }
            }

            function candidateUrls(pathWithQuery) {
                return [`${CONFIG.WORKER_URL}${pathWithQuery}`, `${CONFIG.WORKER_FALLBACK_URL}${pathWithQuery}`];
            }

            async function fetchWithFallback(pathWithQuery, options = {}, timeoutMs = REQUEST_TIMEOUT_MS) {
                let lastError = null;
                for (const url of candidateUrls(pathWithQuery)) {
                    try {
                        return await fetchWithTimeout(url, options, timeoutMs);
                    } catch (err) {
                        lastError = err;
                    }
                }
                throw lastError || new Error('Failed to fetch');
            }

            async function uploadMultipartFile(file, fileName, fileType, queueIndex, queueTotal) {
                const startResponse = await fetchWithFallback(`/multipart/start?file=${encodeURIComponent(fileName)}&type=${encodeURIComponent(fileType)}`, {
                    method: 'POST'
                });

                if (!startResponse.ok) {
                    const startText = await startResponse.text();
                    throw new Error(`Multipart start failed (${startResponse.status}): ${startText || 'No response body'}`);
                }

                const { uploadId } = await startResponse.json();
                if (!uploadId) {
                    throw new Error('Multipart start did not return an uploadId');
                }

                const totalParts = Math.ceil(file.size / MULTIPART_CHUNK_BYTES);
                const parts = [];

                for (let partNumber = 1; partNumber <= totalParts; partNumber++) {
                    const start = (partNumber - 1) * MULTIPART_CHUNK_BYTES;
                    const end = Math.min(start + MULTIPART_CHUNK_BYTES, file.size);
                    const chunk = file.slice(start, end);

                    let etag = null;
                    let lastError = null;

                    for (let attempt = 1; attempt <= MULTIPART_MAX_RETRIES; attempt++) {
                        uploadBtn.textContent = `UPLOADING (${queueIndex}/${queueTotal}) PART ${partNumber}/${totalParts} (TRY ${attempt}/${MULTIPART_MAX_RETRIES})...`;

                        try {
                            const partResponse = await fetchWithFallback(`/multipart/part?file=${encodeURIComponent(fileName)}&uploadId=${encodeURIComponent(uploadId)}&partNumber=${partNumber}`, {
                                method: 'PUT',
                                body: chunk,
                                headers: { 'Content-Type': 'application/octet-stream' }
                            }, REQUEST_TIMEOUT_MS);

                            if (!partResponse.ok) {
                                const partText = await partResponse.text();
                                throw new Error(`Multipart part failed (${partResponse.status}): ${partText || 'No response body'}`);
                            }

                            const partJson = await partResponse.json();
                            etag = partJson.etag;
                            break;
                        } catch (err) {
                            lastError = err;
                            if (attempt < MULTIPART_MAX_RETRIES) {
                                await new Promise(resolve => setTimeout(resolve, attempt * 1000));
                            }
                        }
                    }

                    if (!etag) {
                        throw new Error(lastError?.message || `Multipart part ${partNumber} failed after retries`);
                    }

                    parts.push({ etag, partNumber });
                }

                const completeResponse = await fetchWithFallback(`/multipart/complete?file=${encodeURIComponent(fileName)}&uploadId=${encodeURIComponent(uploadId)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ parts })
                });

                if (!completeResponse.ok) {
                    const completeText = await completeResponse.text();
                    throw new Error(`Multipart complete failed (${completeResponse.status}): ${completeText || 'No response body'}`);
                }
            }

            uploadBtn.onclick = async function() {
                const djName = document.getElementById('ingest-name').value.trim();
                const date = document.getElementById('ingest-date').value.trim();

                if (!djName || !date) {
                    alert('Please fill in DJ NAME and DATE');
                    return;
                }

                const uploadQueue = [];
                
                if (fileVideo.files.length > 0) uploadQueue.push({ file: fileVideo.files[0], shotType: 'MASTER_CAM' });
                if (fileAudio.files.length > 0) uploadQueue.push({ file: fileAudio.files[0], shotType: 'MASTER_AUDIO' });
                
                for (let i = 0; i < fileSocial.files.length; i++) {
                    uploadQueue.push({ file: fileSocial.files[i], shotType: `SOCIAL_CLIP_${i+1}` });
                }
                
                for (let i = 0; i < fileMarketing.files.length; i++) {
                    uploadQueue.push({ file: fileMarketing.files[i], shotType: `MARKETING_THUMB_${i+1}` });
                }

                if (uploadQueue.length === 0) {
                    alert('Please select at least one file to upload.');
                    return;
                }

                uploadBtn.disabled = true;

                try {
                    const safeDj = djName
                        .toLowerCase()
                        .replace(/[^a-z0-9]+/g, '_')
                        .replace(/^_+|_+$/g, '');
                    const safeDate = date
                        .toLowerCase()
                        .replace(/[^a-z0-9]+/g, '_')
                        .replace(/^_+|_+$/g, '');

                    function getAssetPath(file, type) {
                        const ext = (file.name.split('.').pop() || '').toLowerCase();
                        let subFolder = 'misc';

                        if (['mov', 'mp4', 'webm'].includes(ext)) subFolder = 'masters';
                        if (['wav', 'mp3', 'm4a', 'aac'].includes(ext)) subFolder = 'audio';
                        if ((type || '').startsWith('SOCIAL_CLIP')) subFolder = 'social-suite';
                        if (['png', 'jpg', 'jpeg', 'webp', 'gif'].includes(ext) || (type || '').startsWith('MARKETING_THUMB')) subFolder = 'marketing';

                        const cleanOriginal = file.name
                            .toLowerCase()
                            .replace(/\s+/g, '_')
                            .replace(/[^a-z0-9._-]/g, '');

                        return `venue_masters/${safeDj}/${subFolder}/${safeDate}_${cleanOriginal}`;
                    }

                    let successCount = 0;
                    for (const { file, shotType } of uploadQueue) {
                        const queueIndex = successCount + 1;
                        uploadBtn.textContent = `UPLOADING (${queueIndex}/${uploadQueue.length})...`;
                        const fileType = file.type || 'application/octet-stream';
                        const fileName = getAssetPath(file, shotType);

                        if (file.size > MULTIPART_THRESHOLD_BYTES) {
                            await uploadMultipartFile(file, fileName, fileType, queueIndex, uploadQueue.length);
                        } else {
                            const uploadResponse = await fetchWithFallback(`/upload?file=${encodeURIComponent(fileName)}&type=${encodeURIComponent(fileType)}`, {
                                method: 'PUT',
                                body: file,
                                headers: { 'Content-Type': fileType }
                            }, REQUEST_TIMEOUT_MS * 2);

                            if (!uploadResponse.ok) {
                                throw new Error(`Cloudflare upload failed for ${file.name}`);
                            }
                        }

                        successCount++;
                    }
                    
                    alert(`Successfully uploaded ${successCount} files!`);
                    
                    // Reset inputs
                    fileVideo.value = '';
                    fileAudio.value = '';
                    fileSocial.value = '';
                    fileMarketing.value = '';
                    setCardSelected('card-video', false);
                    setCardSelected('card-audio', false);
                    setCardSelected('card-social', false);
                    setCardSelected('card-marketing', false);
                    
                    fetchCloudLibrary();
                } catch (err) {
                    console.error('Upload error:', err);
                    alert('Upload error: ' + err.message);
                } finally {
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = 'PROCESS & INGEST FULL SESSION';
                }
            };
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.add('opacity-100'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        async function fetchCloudLibrary() {
            try {
                const response = await fetch(`${CONFIG.WORKER_URL}/list`);
                const data = await response.json();

                cloudAssets = Array.isArray(data) ? data : [];
                renderList(cloudAssets);
            } catch (e) {
                console.error("Could not load library:", e);
            }
        }

        function getIcon(type) {
            if (type === 'MASTERS') return 'solar:play-bold';
            if (type === 'AUDIO') return 'solar:music-note-bold';
            if (type === 'SOCIAL-SUITE') return 'solar:iphone-bold';
            if (type === 'MARKETING') return 'solar:gallery-bold';
            return 'solar:document-bold';
        }

        function getCleanLabel(type, filename) {
            const t = (type || '').toUpperCase();
            const file = (filename || '').toLowerCase();

            if (t === 'MASTERS' || t === 'MASTER') return 'MASTER 4K SET';
            if (t === 'AUDIO') return 'HQ AUDIO MASTER';

            if (t === 'MARKETING' || t === 'THUMB') {
                return file.includes('vertical')
                    ? 'MARKETING VERTICALS'
                    : 'MARKETING THUMBNAIL';
            }

            return `${t} FORMAT`;
        }

        function renderList(groupedData) {
            const list = document.getElementById('cloud-list') || document.getElementById('recent-sets-list');
            if (!list) return;
            list.innerHTML = '';

            if (!Array.isArray(groupedData) || !groupedData.length) {
                list.innerHTML = '<div class="p-4 text-[10px] font-mono text-zinc-500 uppercase tracking-widest border border-zinc-800 rounded-xl">No known artist uploads yet.</div>';
                return;
            }

            groupedData.forEach(artist => {
                if (!artist?.name || artist.name === 'UNKNOWN') return;

                const folderId = `folder-${artist.slug}`;
                const row = document.createElement('div');
                row.className = 'session-group border border-zinc-800 rounded-2xl overflow-hidden bg-card';

                row.innerHTML = `
                    <div onclick="toggleFolder('${folderId}')" class="p-5 flex items-center justify-between hover:bg-white/[0.02] cursor-pointer group">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-zinc-900 border border-zinc-800 flex items-center justify-center rounded-xl group-hover:border-primary/50">
                                <iconify-icon icon="solar:folder-2-bold" class="text-zinc-600 group-hover:text-primary"></iconify-icon>
                            </div>
                            <div>
                                <p class="text-sm font-black text-white uppercase tracking-tight">${artist.name}</p>
                                <p class="text-[9px] font-mono text-zinc-500 uppercase">MASTERS/${artist.name} // ${artist.assets.length} ASSET(S)</p>
                            </div>
                        </div>
                        <iconify-icon id="arrow-${folderId}" icon="solar:alt-arrow-down-linear" class="text-zinc-700 transition-transform"></iconify-icon>
                    </div>

                    <div id="${folderId}" class="hidden bg-black/40 divide-y divide-white/5">
                        ${(artist.assets || []).map(asset => {
                            const format = (asset.format || (asset.key || '').split('.').pop() || 'FILE').toUpperCase();
                            const assetUrl = `${CONFIG.WORKER_URL}/asset?key=${encodeURIComponent(asset.key || '')}`;
                            return `
                                <div onclick="openAssetPreviewEncoded('${encodeURIComponent(assetUrl)}', '${asset.type}', '${encodeURIComponent(artist.name)}', '${format}')" class="p-4 pl-14 flex items-center justify-between hover:bg-white/[0.03] group/asset cursor-pointer">
                                    <div class="flex items-center gap-4">
                                        <iconify-icon icon="${getIcon(asset.type)}" class="text-zinc-600 group-hover/asset:text-primary"></iconify-icon>
                                        <span class="text-[10px] font-mono text-zinc-400 uppercase tracking-widest">${getCleanLabel(asset.type, asset.key)}</span>
                                    </div>
                                    <iconify-icon icon="solar:cloud-download-bold" class="text-zinc-700 group-hover/asset:text-primary"></iconify-icon>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;

                list.appendChild(row);
            });
        }

        function toggleFolder(folderId) {
            const preview = document.getElementById(folderId);
            const arrow = document.getElementById(`arrow-${folderId}`);
            if (!preview || !arrow) return;

            document.querySelectorAll('[id^="folder-"]').forEach(el => {
                if (el.id !== folderId) el.classList.add('hidden');
            });

            document.querySelectorAll('[id^="arrow-folder-"]').forEach(el => {
                if (el.id !== `arrow-${folderId}`) el.style.transform = 'rotate(0deg)';
            });

            const isHidden = preview.classList.contains('hidden');
            if (isHidden) {
                preview.classList.remove('hidden');
                arrow.style.transform = 'rotate(180deg)';
            } else {
                preview.classList.add('hidden');
                arrow.style.transform = 'rotate(0deg)';
            }
        }

        function openAssetPreviewEncoded(encodedUrl, type, encodedName, format) {
            openAssetPreview(decodeURIComponent(encodedUrl), type, decodeURIComponent(encodedName), format);
        }

        function openAssetPreview(assetUrl, assetType, djName, format) {
            const container = document.getElementById('preview-container');
            const displayArea = document.getElementById('active-asset-display');
            const title = document.getElementById('vault-dj-title');
            const meta = document.getElementById('vault-session-meta');
            if (!container || !displayArea || !title || !meta) return;

            const upperName = (djName || 'UNKNOWN').toUpperCase();
            title.innerHTML = upperName.replace(' ', '<br>');
            meta.textContent = `UPLOAD SESSION // ${new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase()}`;

            displayArea.innerHTML = '';

            if (assetType === 'MASTER' || format === 'MOV' || format === 'MP4' || format === 'WEBM') {
                displayArea.innerHTML = `
                    <div class="space-y-6">
                        <p class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></span> MASTER 4K SET
                        </p>
                        <div class="aspect-video bg-black rounded-[32px] overflow-hidden border border-white/5 shadow-2xl">
                            <video src="${assetUrl}" class="w-full h-full object-cover" controls autoplay playsinline></video>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <a href="${assetUrl}" target="_blank" download class="bg-white text-black font-black py-5 rounded-2xl text-[11px] uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-primary transition-all">
                                <iconify-icon icon="solar:download-bold"></iconify-icon> DOWNLOAD CURRENT ASSET
                            </a>
                            <button onclick="window.open('${assetUrl}', '_blank', 'noopener,noreferrer')" class="bg-zinc-900 text-white font-black py-5 rounded-2xl text-[11px] uppercase tracking-widest border border-white/5 flex items-center justify-center gap-2">
                                <iconify-icon icon="solar:link-bold"></iconify-icon> OPEN DIRECT LINK
                            </button>
                        </div>
                    </div>`;
            } else if (assetType === 'THUMB' || format === 'PNG' || format === 'JPG' || format === 'JPEG' || format === 'WEBP' || format === 'GIF') {
                displayArea.innerHTML = `
                    <div class="space-y-6">
                        <p class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-primary"></span> MARKETING THUMBNAIL & MARKETING VERTICALS
                        </p>
                        <img src="${assetUrl}" class="w-full aspect-video object-cover rounded-[32px] border border-white/10 shadow-2xl" alt="Thumbnail preview">
                        <a href="${assetUrl}" target="_blank" download class="w-full bg-white text-black font-black py-5 rounded-2xl text-[11px] uppercase tracking-widest flex items-center justify-center gap-2">
                            DOWNLOAD CURRENT ASSET
                        </a>
                    </div>`;
            } else if (assetType === 'AUDIO' || ['MP3', 'WAV', 'M4A', 'AAC'].includes(format)) {
                displayArea.innerHTML = `
                    <div class="space-y-6">
                        <p class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-primary"></span> HQ AUDIO MASTER (.WAV)
                        </p>
                        <div class="bg-black rounded-[32px] overflow-hidden border border-white/5 p-6 shadow-2xl">
                            <audio src="${assetUrl}" class="w-full" controls autoplay></audio>
                        </div>
                        <a href="${assetUrl}" target="_blank" download class="w-full bg-white text-black font-black py-5 rounded-2xl text-[11px] uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-primary transition-all">
                            DOWNLOAD CURRENT ASSET
                        </a>
                    </div>`;
            } else {
                displayArea.innerHTML = `
                    <div class="space-y-6">
                        <div class="bg-black rounded-[32px] overflow-hidden border border-white/5 p-6 text-[10px] font-mono text-zinc-400 uppercase tracking-widest">Preview not available for this format.</div>
                        <a href="${assetUrl}" target="_blank" download class="w-full bg-white text-black font-black py-5 rounded-2xl text-[11px] uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-primary transition-all">DOWNLOAD FILE</a>
                    </div>`;
            }

            container.classList.remove('hidden');
            container.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function closePreview() {
            const container = document.getElementById('preview-container');
            const displayArea = document.getElementById('active-asset-display');
            if (displayArea) displayArea.innerHTML = '';
            container.classList.add('hidden');
        }
    </script>
</body>
</html>
