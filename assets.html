<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>local / assets™</title>
    
    <link rel="stylesheet" href="styles/tailwind.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player"></script>

    <style>
        :root { --venue-p: 40px; --neon: #39FF14; }
        body { background: #050505; color: white; font-family: 'JetBrains Mono', monospace; -webkit-font-smoothing: antialiased; }
        
        /* Rigid Symmetrical Grid for Vault */
        .vault-grid {
            display: grid;
            grid-template-columns: 1fr 240px 140px; /* Symmetrical columns */
            align-items: center;
            padding: 32px var(--venue-p);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .vault-header {
            grid-template-columns: 1fr 240px 140px;
            padding: 12px var(--venue-p);
            border-bottom: 2px solid #18181b;
            opacity: 0.3;
        }

        .artist-title {
            font-size: 26px;
            font-weight: 900;
            font-style: italic;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            line-height: 1;
        }

        .mono-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.3em; color: #52525b; }
        
        /* Status Badges */
        .status-pill {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 16px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.02);
        }

        /* Player Container */
        #active-asset-display {
            background: #000;
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            margin-top: 20px;
        }

        mux-player { width: 100%; aspect-ratio: 16/9; --primary-color: var(--neon); }
        .nav-link.active { color: var(--neon); border: 1px solid #27272a; background: rgba(255,255,255,0.03); }
    </style>
</head>
<body class="flex h-screen w-screen overflow-hidden">

    <aside class="w-64 border-r border-zinc-800 bg-[#0a0a0a] flex flex-col shrink-0">
        <div class="h-16 flex items-center px-6 border-b border-zinc-800">
            <img src="https://res.cloudinary.com/dso3xwno0/image/upload/v1770974378/ibyostiwecnvm2cebqar.svg" class="h-5 brightness-0 invert" alt="logo">
        </div>
        <nav class="flex-1 p-4 space-y-2">
            <a href="dashboard.html" class="nav-link flex items-center gap-3 px-3 py-2 text-sm text-zinc-500 hover:text-white transition-colors"><iconify-icon icon="solar:widget-5-bold"></iconify-icon>Overview</a>
            <a href="assets.html" class="nav-link active flex items-center gap-3 px-3 py-2 text-sm rounded-md"><iconify-icon icon="solar:clapperboard-play-bold"></iconify-icon>Media Assets</a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 flex items-center justify-between px-[var(--venue-p)] border-b border-zinc-800 bg-[#0a0a0a]/50 backdrop-blur-xl">
            <span class="text-primary font-mono text-[9px] uppercase tracking-[0.4em]">Infrastructure Tier // Mux Pure Pipeline</span>
            <div class="flex items-center gap-2">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute h-full w-full rounded-full bg-primary opacity-40"></span>
                    <span class="bg-primary h-2 w-2 rounded-full"></span>
                </span>
                <span class="text-[8px] font-mono text-zinc-500 uppercase tracking-widest">System Online</span>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto p-[var(--venue-p)]">
            <div class="max-w-[1400px] mx-auto space-y-12">
                
                <div class="p-10 border border-zinc-800 rounded-[32px] bg-[#0a0a0a]/30 space-y-10">
                    <div class="grid grid-cols-3 gap-8">
                        <input type="text" id="ingest-name" placeholder="ARTIST IDENTITY" class="bg-black border border-zinc-800 rounded-xl p-4 text-xs font-bold uppercase text-white outline-none focus:border-primary">
                        <input type="text" id="ingest-date" placeholder="CAPTURE DATE" class="bg-black border border-zinc-800 rounded-xl p-4 text-xs font-bold text-white outline-none">
                        <select id="ingest-shot" class="bg-black border border-zinc-800 rounded-xl p-4 text-xs font-bold uppercase text-zinc-400 outline-none">
                            <option>MASTER CAM</option>
                            <option>BOOTH CAM</option>
                        </select>
                    </div>
                    <button id="upload-btn" class="w-full bg-white text-black font-black py-6 rounded-2xl uppercase tracking-[0.4em] text-[10px] hover:bg-primary transition-all">INGEST MASTER TO VAULT</button>
                </div>

                <div id="preview-container" class="hidden">
                    <div class="flex justify-between items-end border-b border-zinc-800 pb-8 mb-8">
                        <h2 id="vault-dj-title" class="artist-title text-5xl">READY</h2>
                        <button onclick="location.reload()" class="text-[9px] uppercase border border-white/10 px-6 py-2 rounded-full hover:bg-white/5">Clear Buffer</button>
                    </div>
                    <div id="active-asset-display"></div>
                </div>

                <div class="space-y-4">
                    <div class="vault-grid vault-header">
                        <span class="mono-label">Master Asset Identity</span>
                        <span class="mono-label text-center">Cloud Status</span>
                        <span class="mono-label text-right">Command Control</span>
                    </div>
                    <div id="cloud-list" class="divide-y divide-white/5">
                        </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        const CONFIG = {
            WORKER_URL: "/api/get-upload-url",
            API_KEY: "1mmm9dZ1MIl5xkiqlal_gBF5IqpNy_3M2WjQOiNU"
        };

        document.addEventListener('DOMContentLoaded', () => {
            flatpickr("#ingest-date", { defaultDate: "today", dateFormat: "d M Y", theme: "dark" });
            renderVault();
        });

        // Fixed renderer for perfect symmetry and artist name mapping
        function renderVault() {
            const list = document.getElementById('cloud-list');
            const history = JSON.parse(localStorage.getItem('vault-history') || '[]');
            
            if (!history.length) {
                list.innerHTML = `<div class="p-20 text-center mono-label opacity-30 italic">// VAULT ARCHIVE EMPTY</div>`;
                return;
            }

            list.innerHTML = history.map(asset => {
                const isReady = asset.status === 'ready' || (new Date() - new Date(asset.created_at) > 15000);
                // Correct name mapping to prevent 'UNDEFINED'
                const artistName = asset.artist || asset.dj || 'ANONYMOUS'; 
                
                return `
                <div class="vault-grid group hover:bg-white/[0.01] transition-colors">
                    <div class="space-y-2">
                        <h4 class="artist-title">${artistName}</h4>
                        <div class="flex items-center gap-3">
                            <span class="mono-label text-[7px] text-zinc-500">${asset.date || '07 MAR 2026'}</span>
                            <span class="w-1 h-1 rounded-full bg-zinc-800"></span>
                            <span class="mono-label text-[7px] text-zinc-700">MASTER_REF: ${asset.id.substring(0,10)}</span>
                        </div>
                    </div>

                    <div class="flex justify-center">
                        <div class="status-pill ${isReady ? 'border-primary/20' : 'border-yellow-500/20'}">
                            <span class="relative h-2 w-2">
                                <span class="absolute inset-0 rounded-full animate-ping opacity-20 ${isReady ? 'bg-primary' : 'bg-yellow-500'}"></span>
                                <span class="absolute inset-0 rounded-full ${isReady ? 'bg-primary' : 'bg-yellow-500'}"></span>
                            </span>
                            <span class="text-[9px] font-black tracking-widest ${isReady ? 'text-primary' : 'text-yellow-500'}">
                                ${isReady ? 'READY' : 'TRANSCODING'}
                            </span>
                        </div>
                    </div>

                    <div class="flex justify-end gap-3">
                        <button onclick="playAsset('${asset.id}', '${artistName}')" class="h-12 w-12 flex items-center justify-center bg-white text-black rounded-xl hover:bg-primary transition-all">
                            <iconify-icon icon="solar:play-bold" class="text-xl"></iconify-icon>
                        </button>
                        <button class="h-12 w-12 flex items-center justify-center border border-zinc-800 rounded-xl hover:bg-zinc-900 transition-all text-zinc-600">
                            <iconify-icon icon="solar:download-square-bold" class="text-xl"></iconify-icon>
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        // Handle Playback without "Network Error"
        function playAsset(id, dj) {
            const display = document.getElementById('active-asset-display');
            document.getElementById('preview-container').classList.remove('hidden');
            document.getElementById('vault-dj-title').innerText = dj.toUpperCase();
            
            display.innerHTML = `<div class="p-20 flex flex-col items-center justify-center animate-pulse">
                <iconify-icon icon="solar:clapperboard-play-bold" class="text-6xl text-zinc-800 mb-4"></iconify-icon>
                <span class="mono-label text-[10px]">Syncing Mux Manifest...</span>
            </div>`;

            setTimeout(() => {
                display.innerHTML = `
                <div class="space-y-10 animate-in fade-in duration-1000">
                    <mux-player playback-id="${id}" metadata-video-title="${dj}" autoplay></mux-player>
                    <div class="grid grid-cols-2 gap-6 p-10 pt-0">
                        <a href="https://stream.mux.com/${id}/high.mp4?download=true" class="bg-white text-black py-5 rounded-2xl text-center font-black text-[11px] uppercase tracking-[0.3em]">Download 4K Master</a>
                        <button onclick="location.reload()" class="border border-zinc-800 text-white py-5 rounded-2xl font-black text-[11px] uppercase tracking-[0.3em]">New Session</button>
                    </div>
                </div>`;
                display.scrollIntoView({ behavior: 'smooth' });
            }, 3500);
        }

        // Upload Logic
        document.getElementById('upload-btn').onclick = async () => {
            const dj = document.getElementById('ingest-name').value;
            const btn = document.getElementById('upload-btn');
            if(!dj) return alert("ENTER ARTIST IDENTITY");

            btn.disabled = true;
            btn.innerHTML = "REQUESTING UPLOAD SLOT...";

            try {
                const res = await fetch(CONFIG.WORKER_URL, { 
                    method: 'POST', 
                    headers: {'x-api-key': CONFIG.API_KEY, 'Content-Type': 'application/json'}
                });
                const data = await res.json();
                
                const xhr = new XMLHttpRequest();
                xhr.open('PUT', data.url);
                xhr.upload.onprogress = (e) => {
                    const pct = Math.round((e.loaded / e.total) * 100);
                    btn.innerHTML = `UPLOADING TO MUX: ${pct}%`;
                };
                xhr.onload = () => {
                    btn.innerHTML = "INGEST COMPLETE";
                    btn.style.background = "#39FF14";
                    
                    const asset = {
                        id: data.id,
                        artist: dj,
                        date: document.getElementById('ingest-date').value,
                        created_at: new Date().toISOString(),
                        status: 'processing'
                    };
                    
                    let vault = JSON.parse(localStorage.getItem('vault-history') || '[]');
                    vault.unshift(asset);
                    localStorage.setItem('vault-history', JSON.stringify(vault.slice(0, 20)));
                    
                    playAsset(data.id, dj);
                    renderVault();
                };
                xhr.send(document.getElementById('file-video').files[0]);
            } catch (e) {
                btn.disabled = false;
                alert("Upload Failed. Check Console.");
            }
        };
    </script>
</body>
</html>
