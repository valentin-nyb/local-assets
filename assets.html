<body class="font-sans antialiased bg-background text-foreground overflow-hidden h-screen w-screen flex selection:bg-primary selection:text-black">

    <main class="flex-1 flex flex-col overflow-hidden relative bg-background">
         <header class="h-16 flex items-center px-8 border-b border-zinc-800 justify-between">             <span class="text-primary font-mono text-[9px] uppercase tracking-[0.4em]">Infrastructure Tier // London</span>             <div class="flex items-center gap-2">                 <span class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></span>                 <span class="text-[8px] font-mono text-zinc-500">LIVE MUX UPLOAD ACTIVE</span>             </div>         </header>          <div class="flex-1 p-8 overflow-y-auto">             <div class="max-w-[1200px] mx-auto space-y-12 pb-20">                                  <div class="ingest-card space-y-8">                     <div class="grid grid-cols-1 md:grid-cols-3 gap-6">                         <input type="text" id="ingest-name" placeholder="DJ / ARTIST NAME" class="bg-black border border-zinc-800 rounded-xl p-4 text-xs font-bold text-white uppercase outline-none focus:border-primary">                         <input type="text" id="ingest-date" placeholder="SELECT DATE" class="bg-black border border-zinc-800 rounded-xl p-4 text-xs font-bold text-white outline-none">                         <select id="ingest-shot" class="bg-black border border-zinc-800 rounded-xl p-4 text-xs text-zinc-400 font-bold uppercase outline-none">                             <option value="MASTER">MASTER CAM</option>                             <option value="BOOTH">BOOTH CAM</option>                         </select>                     </div>                      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">                         <label class="upload-node p-6 flex flex-col items-center justify-center gap-2" id="node-video">                             <iconify-icon icon="solar:videocamera-record-bold" class="text-2xl text-zinc-600"></iconify-icon>                             <span class="text-[8px] font-mono uppercase text-zinc-500">4K Master (.MOV)</span>                             <input type="file" id="file-video" class="hidden" accept="video/*" onchange="markActive('video')">                         </label>                         <div class="upload-node p-6 flex flex-col items-center justify-center gap-2 opacity-30 cursor-not-allowed">                             <iconify-icon icon="solar:music-note-bold" class="text-2xl text-zinc-600"></iconify-icon>                             <span class="text-[8px] font-mono uppercase text-zinc-500">HQ Audio (Auto-Extract)</span>                         </div>                         <div class="upload-node p-6 flex flex-col items-center justify-center gap-2 opacity-30 cursor-not-allowed">                             <iconify-icon icon="solar:gallery-bold" class="text-2xl text-zinc-600"></iconify-icon>                             <span class="text-[8px] font-mono uppercase text-zinc-500">Marketing (Auto-Gen)</span>                         </div>                     </div>                      <button id="upload-btn" class="w-full bg-white text-black font-black py-5 rounded-2xl uppercase tracking-[0.2em] text-[11px] hover:bg-primary transition-all">                         INGEST FULL LOCAL/SESSION                     </button>                 </div>                  <div id="preview-container" class="hidden border-b border-zinc-800 pb-12">                     <h2 id="vault-dj-title" class="text-3xl font-black italic mb-6"></h2>                     <div id="active-asset-display" class="max-w-4xl mx-auto"></div>                 </div>                  <div class="space-y-4">                     <h3 class="text-[10px] font-mono text-zinc-600 uppercase tracking-[0.3em] border-b border-zinc-800 pb-2">Vault History</h3>                     <div id="cloud-list"></div>                 </div>             </div>         </div>     
</main>
<script>
    window.markActive = function(type) {
        var node = document.getElementById('node-' + type);
        if (node) node.classList.add('active');
    };

    window.onload = function() {
        var uploadBtn = document.getElementById('upload-btn');

        uploadBtn.onclick = async function() {
            var file = document.getElementById('file-video').files[0];
            var artist = document.getElementById('ingest-name').value;
            var date = document.getElementById('ingest-date').value;

            if (!file || !artist) return alert("Artist and File are required.");

            uploadBtn.disabled = true;
            uploadBtn.innerHTML = "REQUESTING MUX ACCESS...";

            try {
                var response = await fetch('https://local-assets.com/api/get-upload-url', { method: 'POST' });
                var data = await response.json();

                if (!data.url) {
                    console.error('Server Error:', data.error);
                    uploadBtn.innerHTML = 'AUTH FAILED - CHECK KEYS';
                    return;
                }

                var url = data.url;
                var id = data.id;

                var xhr = new XMLHttpRequest();
                xhr.open('PUT', url);
                xhr.upload.onprogress = function(e) {
                    var pct = Math.round((e.loaded / e.total) * 100);
                    uploadBtn.innerHTML = 'UPLOADING: ' + pct + '%';
                };
                xhr.onload = function() {
                    if (xhr.status === 200) {
                        uploadBtn.innerHTML = "PROCESSING VIDEO...";
                        uploadBtn.style.background = "#39FF14";
                        saveToHistory(id, artist, date);
                        renderVaultHistory();
                        pollForPlaybackId(id);
                    }
                };
                xhr.send(file);
            } catch (err) {
                alert("Upload Failed: Check if 'npx vercel dev' is running");
                uploadBtn.disabled = false;
            }
        };

        flatpickr("#ingest-date", { defaultDate: "today", theme: "dark" });
        renderVaultHistory();
    };

    function saveToHistory(id, artist, date) {
        var h = JSON.parse(localStorage.getItem('vault-history') || '[]');
        h.unshift({ id: id, artist: artist, date: date || new Date().toLocaleDateString() });
        localStorage.setItem('vault-history', JSON.stringify(h));
    }

    async function pollForPlaybackId(uploadId) {
        var checkStatus = setInterval(function() {
            try {
                console.log("Checking if Mux has finished processing...");
                renderVaultHistory();
            } catch (e) {
                clearInterval(checkStatus);
            }
        }, 5000);
    }

    var sessions = [
        {
            id: 'session_saba_saba',
            name: 'AMONGST FEW',
            date: '27 Mar 2026',
            playbackId: 'r55lk7leV2PQUUWI8ChvkyFYRSzN00005m19t02wGSShTY',
            venue: 'SABA SABA',
            assets: [
                { type: 'MASTER', label: '4K Master', ext: 'MOV', icon: 'solar:play-bold', color: 'text-primary' },
                { type: 'AUDIO', label: 'HQ Audio', ext: 'WAV', icon: 'solar:music-note-bold', color: 'text-blue-400' }
            ]
        }
    ];

    window.showAudioPreview = function(playbackId, name) {
        var display = document.getElementById('active-asset-display');
        document.getElementById('preview-container').classList.remove('hidden');
        document.getElementById('vault-dj-title').innerText = (name || '').toUpperCase();
        display.innerHTML = '<iframe src="https://player.mux.com/' + playbackId + '" style="width:100%;border:none;aspect-ratio:16/9;" allowfullscreen></iframe>';
        display.scrollIntoView({ behavior: 'smooth' });
    };

    function renderVaultHistory() {
        var list = document.getElementById('cloud-list');
        var localUploads = JSON.parse(localStorage.getItem('vault-history') || '[]');
        var allSessions = sessions.concat(localUploads);
        var html = '';
        for (var i = 0; i < allSessions.length; i++) {
            var s = allSessions[i];
            var artistName = s.name || s.artist || 'UNKNOWN';
            var dateStr = s.date || '';
            var pid = s.playbackId || '';
            html += '<div class="vault-card" id="vault-' + i + '">'
                + '<div class="vault-card-header" onclick="toggleVaultFolder(' + i + ')">'
                + '<div>'
                + '<h4 class="text-2xl font-black italic uppercase">' + artistName + '</h4>'
                + '<span class="text-[8px] font-mono text-zinc-600 uppercase">' + (s.venue ? s.venue + ' // ' : 'Archive Secured // ') + dateStr + '</span>'
                + '</div>'
                + '<button class="bg-white text-black h-12 w-12 rounded-xl flex items-center justify-center hover:bg-primary transition-all">'
                + '<iconify-icon icon="solar:play-bold"></iconify-icon>'
                + '</button>'
                + '</div>'
                + '<div class="asset-tray">'
                + '<div class="flex gap-4 pt-4">';
            if (pid) {
                html += '<button class="px-4 py-2 bg-zinc-900 border border-zinc-800 rounded-lg text-[9px] font-black hover:border-primary" onclick="event.stopPropagation(); showAudioPreview(\'' + pid + '\', \'' + artistName + '\')">'
                    + 'PLAY SESSION'
                    + '</button>';
            }
            if (s.assets) {
                for (var j = 0; j < s.assets.length; j++) {
                    var a = s.assets[j];
                    html += '<span class="px-4 py-2 bg-zinc-900 border border-zinc-800 rounded-lg text-[9px] font-black ' + a.color + '">'
                        + '<iconify-icon icon="' + a.icon + '" class="mr-1"></iconify-icon>' + a.label + ' .' + a.ext
                        + '</span>';
                }
            }
            html += '</div></div></div>';
        }
        list.innerHTML = html;
    }

    window.toggleVaultFolder = function(i) {
        document.getElementById('vault-' + i).classList.toggle('expanded');
    };
</script>
