    <script>
        let cloudAssets = [];
        const CONFIG = {
            WORKER_URL: 'https://local-assets-worker.smackeprang-v.workers.dev'
        };

        window.onload = function() {
            flatpickr("#ingest-date", { defaultDate: "today", dateFormat: "d M Y" });
            fetchCloudLibrary();
            setupUploadHandler();
        };

        function setupUploadHandler() {
            const uploadBtn = document.getElementById('upload-btn');
            const MULTIPART_THRESHOLD_BYTES = 95 * 1024 * 1024;
            const MULTIPART_CHUNK_BYTES = 6 * 1024 * 1024;
            const MULTIPART_MAX_RETRIES = 3;
            const REQUEST_TIMEOUT_MS = 60000;

            const fileVideo = document.getElementById('file-video');
            const fileAudio = document.getElementById('file-audio');
            const fileSocial = document.getElementById('file-social');
            const fileMarketing = document.getElementById('file-marketing');

            function setCardSelected(cardId, isSelected) {
                const card = document.getElementById(cardId);
                if (!card) return;

                const icon = card.querySelector('.upload-card-icon');
                const label = card.querySelector('.upload-card-label');

                if (isSelected) {
                    card.classList.add('border-primary', 'bg-primary/10', 'shadow-[0_0_20px_rgba(57,255,20,0.12)]');
                    card.classList.remove('border-zinc-800', 'bg-black');
                    if (icon) icon.classList.replace('text-zinc-600', 'text-primary');
                    if (label) label.classList.replace('text-zinc-500', 'text-primary');
                } else {
                    card.classList.remove('border-primary', 'bg-primary/10', 'shadow-[0_0_20px_rgba(57,255,20,0.12)]');
                    card.classList.add('border-zinc-800', 'bg-black');
                    if (icon) icon.classList.replace('text-primary', 'text-zinc-600');
                    if (label) label.classList.replace('text-primary', 'text-zinc-500');
                }
            }

            fileVideo.addEventListener('change', () => setCardSelected('card-video', fileVideo.files.length > 0));
            fileAudio.addEventListener('change', () => setCardSelected('card-audio', fileAudio.files.length > 0));
            fileSocial.addEventListener('change', () => setCardSelected('card-social', fileSocial.files.length > 0));
            fileMarketing.addEventListener('change', () => setCardSelected('card-marketing', fileMarketing.files.length > 0));

            async function fetchWithTimeout(resource, options = {}, timeoutMs = REQUEST_TIMEOUT_MS) {
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), timeoutMs);

                try {
                    return await fetch(resource, { ...options, signal: controller.signal });
                } catch (err) {
                    if (err?.name === 'AbortError') {
                        throw new Error(`Request timed out after ${Math.round(timeoutMs / 1000)}s`);
                    }
                    throw err;
                } finally {
                    clearTimeout(timer);
                }
            }

            async function uploadMultipartFile(file, fileName, fileType, queueIndex, queueTotal) {
                const startResponse = await fetchWithTimeout(`${CONFIG.WORKER_URL}/multipart/start?file=${encodeURIComponent(fileName)}&type=${encodeURIComponent(fileType)}`, {
                    method: 'POST'
                });

                if (!startResponse.ok) {
                    const startText = await startResponse.text();
                    throw new Error(`Multipart start failed (${startResponse.status}): ${startText || 'No response body'}`);
                }

                const { uploadId } = await startResponse.json();
                if (!uploadId) {
                    throw new Error('Multipart start did not return an uploadId');
                }

                const totalParts = Math.ceil(file.size / MULTIPART_CHUNK_BYTES);
                const parts = [];

                for (let partNumber = 1; partNumber <= totalParts; partNumber++) {
                    const start = (partNumber - 1) * MULTIPART_CHUNK_BYTES;
                    const end = Math.min(start + MULTIPART_CHUNK_BYTES, file.size);
                    const chunk = file.slice(start, end);

                    let etag = null;
                    let lastError = null;

                    for (let attempt = 1; attempt <= MULTIPART_MAX_RETRIES; attempt++) {
                        uploadBtn.textContent = `UPLOADING (${queueIndex}/${queueTotal}) PART ${partNumber}/${totalParts} (TRY ${attempt}/${MULTIPART_MAX_RETRIES})...`;

                        try {
                            const partResponse = await fetchWithTimeout(`${CONFIG.WORKER_URL}/multipart/part?file=${encodeURIComponent(fileName)}&uploadId=${encodeURIComponent(uploadId)}&partNumber=${partNumber}`, {
                                method: 'PUT',
                                body: chunk,
                                headers: { 'Content-Type': 'application/octet-stream' }
                            }, REQUEST_TIMEOUT_MS);

                            if (!partResponse.ok) {
                                const partText = await partResponse.text();
                                throw new Error(`Multipart part failed (${partResponse.status}): ${partText || 'No response body'}`);
                            }

                            const partJson = await partResponse.json();
                            etag = partJson.etag;
                            break;
                        } catch (err) {
                            lastError = err;
                            if (attempt < MULTIPART_MAX_RETRIES) {
                                await new Promise(resolve => setTimeout(resolve, attempt * 1000));
                            }
                        }
                    }

                    if (!etag) {
                        throw new Error(lastError?.message || `Multipart part ${partNumber} failed after retries`);
                    }

                    parts.push({ etag, partNumber });
                }

                const completeResponse = await fetchWithTimeout(`${CONFIG.WORKER_URL}/multipart/complete?file=${encodeURIComponent(fileName)}&uploadId=${encodeURIComponent(uploadId)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ parts })
                });

                if (!completeResponse.ok) {
                    const completeText = await completeResponse.text();
                    throw new Error(`Multipart complete failed (${completeResponse.status}): ${completeText || 'No response body'}`);
                }
            }

            uploadBtn.onclick = async function() {
                const djName = document.getElementById('ingest-name').value.trim();
                const date = document.getElementById('ingest-date').value.trim();

                if (!djName || !date) {
                    alert('Please fill in DJ NAME and DATE');
                    return;
                }

                const uploadQueue = [];
                
                if (fileVideo.files.length > 0) uploadQueue.push({ file: fileVideo.files[0], shotType: 'MASTER_CAM' });
                if (fileAudio.files.length > 0) uploadQueue.push({ file: fileAudio.files[0], shotType: 'MASTER_AUDIO' });
                
                for (let i = 0; i < fileSocial.files.length; i++) {
                    uploadQueue.push({ file: fileSocial.files[i], shotType: `SOCIAL_CLIP_${i+1}` });
                }
                
                for (let i = 0; i < fileMarketing.files.length; i++) {
                    uploadQueue.push({ file: fileMarketing.files[i], shotType: `MARKETING_THUMB_${i+1}` });
                }

                if (uploadQueue.length === 0) {
                    alert('Please select at least one file to upload.');
                    return;
                }

                uploadBtn.disabled = true;

                try {
                    const safeDj = djName
                        .toLowerCase()
                        .replace(/[^a-z0-9]+/g, '_')
                        .replace(/^_+|_+$/g, '');
                    const safeDate = date
                        .toLowerCase()
                        .replace(/[^a-z0-9]+/g, '_')
                        .replace(/^_+|_+$/g, '');

                    let successCount = 0;
                    for (const { file, shotType } of uploadQueue) {
                        const queueIndex = successCount + 1;
                        uploadBtn.textContent = `UPLOADING (${queueIndex}/${uploadQueue.length})...`;
                        const ext = (file.name.split('.').pop() || '').toLowerCase();
                        const fileType = file.type || 'application/octet-stream';
                        const fileName = `venue_masters/${safeDj}_${safeDate}_${shotType.toLowerCase()}.${ext}`;

                        if (file.size > MULTIPART_THRESHOLD_BYTES) {
                            await uploadMultipartFile(file, fileName, fileType, queueIndex, uploadQueue.length);
                        } else {
                            const authResponse = await fetchWithTimeout(`${CONFIG.WORKER_URL}/presign?file=${encodeURIComponent(fileName)}&type=${encodeURIComponent(fileType)}`);

                            if (!authResponse.ok) {
                                const authText = await authResponse.text();
                                throw new Error(`Presign failed (${authResponse.status}): ${authText || 'No response body'}`);
                            }

                            const { uploadUrl } = await authResponse.json();

                            const uploadResponse = await fetchWithTimeout(uploadUrl, {
                                method: 'PUT',
                                body: file,
                                headers: { 'Content-Type': fileType }
                            }, REQUEST_TIMEOUT_MS * 2);

                            if (!uploadResponse.ok) {
                                throw new Error(`Cloudflare upload failed for ${file.name}`);
                            }
                        }

                        successCount++;
                    }
                    
                    alert(`Successfully uploaded ${successCount} files!`);
                    
                    // Reset inputs
                    fileVideo.value = '';
                    fileAudio.value = '';
                    fileSocial.value = '';
                    fileMarketing.value = '';
                    setCardSelected('card-video', false);
                    setCardSelected('card-audio', false);
                    setCardSelected('card-social', false);
                    setCardSelected('card-marketing', false);
                    
                    fetchCloudLibrary();
                } catch (err) {
                    console.error('Upload error:', err);
                    alert('Upload error: ' + err.message);
                } finally {
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = 'PROCESS & INGEST FULL SESSION';
                }
            };
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.add('opacity-100'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        async function fetchCloudLibrary() {
            try {
                const response = await fetch(`${CONFIG.WORKER_URL}/list`);
                const data = await response.json();

                cloudAssets = data.map(file => parseAssetMeta(file.Key));
                renderList();
            } catch (e) {
                console.error("Could not load library:", e);
            }
        }

        function parseAssetMeta(key) {
            const fullName = (key || '').split('/').pop() || '';
            const ext = (fullName.split('.').pop() || '').toUpperCase();
            const base = fullName.replace(/\.[^.]+$/, '');
            const lower = base.toLowerCase();

            let shot = 'CAM';
            let assetType = 'MASTER';
            let sessionBase = base;

            if (lower.endsWith('_master_cam')) {
                shot = 'MASTER CAM';
                assetType = 'MASTER';
                sessionBase = base.slice(0, -('_master_cam'.length));
            } else if (lower.endsWith('_master_audio')) {
                shot = 'MASTER AUDIO';
                assetType = 'AUDIO';
                sessionBase = base.slice(0, -('_master_audio'.length));
            } else if (/_social_clip_\d+$/i.test(base)) {
                const match = base.match(/_social_clip_(\d+)$/i);
                shot = `SOCIAL CLIP ${match ? match[1] : ''}`.trim();
                assetType = 'SOCIAL';
                sessionBase = base.replace(/_social_clip_\d+$/i, '');
            } else if (/_marketing_thumb_\d+$/i.test(base)) {
                const match = base.match(/_marketing_thumb_(\d+)$/i);
                shot = `THUMB ${match ? match[1] : ''}`.trim();
                assetType = 'THUMB';
                sessionBase = base.replace(/_marketing_thumb_\d+$/i, '');
            }

            const tokens = sessionBase.split('_').filter(Boolean);
            const dateTokens = tokens.length >= 3 ? tokens.slice(-3) : ['recent'];
            const djTokens = tokens.length > 3 ? tokens.slice(0, -3) : [tokens[0] || 'unknown'];

            const dj = djTokens.join(' ').toUpperCase();
            const date = dateTokens.join(' ').toUpperCase();
            const sessionId = `${djTokens.join('_')}_${dateTokens.join('_')}`.toLowerCase() || 'unknown_recent';

            let icon = 'solar:play-bold';
            let color = 'text-primary';
            if (['MP3', 'WAV'].includes(ext)) {
                icon = 'solar:music-note-bold';
                color = 'text-blue-400';
            } else if (['JPG', 'JPEG', 'PNG', 'WEBP'].includes(ext)) {
                icon = 'solar:gallery-bold';
                color = 'text-orange-400';
            } else if (shot.startsWith('SOCIAL CLIP')) {
                icon = 'solar:iphone-bold';
                color = 'text-purple-400';
            }

            return {
                key,
                dj,
                date,
                shot,
                assetType,
                format: ext || 'FILE',
                icon,
                color,
                sessionId,
                sessionKey: `${dj}_${date}`,
                url: `${CONFIG.WORKER_URL}/asset?key=${encodeURIComponent(key)}`
            };
        }

        function renderList() {
            const list = document.getElementById('cloud-list');
            list.innerHTML = '';

            const knownAssets = cloudAssets.filter(item => item.dj && item.dj !== 'UNKNOWN');

            const groupedAssets = knownAssets.reduce((acc, item) => {
                if (!acc[item.sessionKey]) {
                    acc[item.sessionKey] = { id: item.sessionId, dj: item.dj, date: item.date, items: [] };
                }
                acc[item.sessionKey].items.push(item);
                return acc;
            }, {});

            const sessions = Object.values(groupedAssets)
                .sort((a, b) => b.date.localeCompare(a.date));

            if (!sessions.length) {
                list.innerHTML = '<div class="p-4 text-[10px] font-mono text-zinc-500 uppercase tracking-widest border border-zinc-800 rounded-xl">No known artist uploads yet.</div>';
                return;
            }

            list.innerHTML = sessions.map(session => `
                <div class="session-group border border-zinc-800 rounded-2xl overflow-hidden bg-card">
                    <div onclick="toggleAssetPreview('${session.id}')" class="p-5 flex items-center justify-between hover:bg-white/[0.02] transition-colors cursor-pointer group">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-[#050505] border border-zinc-800 flex items-center justify-center rounded-xl group-hover:border-primary/50 transition-colors">
                                <iconify-icon icon="solar:folder-2-bold" class="text-zinc-600 group-hover:text-primary"></iconify-icon>
                            </div>
                            <div>
                                <p class="text-sm font-black text-white uppercase tracking-tight">${session.dj}</p>
                                <p class="text-[9px] font-mono text-zinc-500 uppercase tracking-widest">${session.date} // ${session.items.length} ASSETS</p>
                            </div>
                        </div>
                        <iconify-icon id="arrow-${session.id}" icon="solar:alt-arrow-down-linear" class="text-zinc-700 transition-transform duration-300"></iconify-icon>
                    </div>

                    <div id="folder-preview-${session.id}" class="hidden bg-black/40 border-t border-zinc-800/50 divide-y divide-zinc-800/40">
                        ${session.items.map(item => `
                            <div onclick="previewAssetByKey('${encodeURIComponent(item.key)}')" class="p-4 pl-12 flex items-center justify-between hover:bg-white/[0.03] transition-all group/asset cursor-pointer">
                                <div class="flex items-center gap-4 min-w-0">
                                    <div class="w-8 h-8 bg-zinc-900/50 flex items-center justify-center rounded-lg border border-zinc-800/50 shrink-0">
                                        <iconify-icon icon="${item.icon}" class="${item.color} text-sm"></iconify-icon>
                                    </div>
                                    <div class="min-w-0">
                                        <p class="text-[10px] font-bold text-zinc-300 uppercase truncate">${item.shot}</p>
                                        <p class="text-[8px] font-mono text-zinc-600 uppercase tracking-widest">${item.format} FORMAT</p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <button onclick="previewAssetByKey('${encodeURIComponent(item.key)}'); event.stopPropagation();" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-primary/10 transition-colors" title="Preview">
                                        <iconify-icon icon="solar:eye-bold" class="text-zinc-700 group-hover/asset:text-primary"></iconify-icon>
                                    </button>
                                    <a href="${item.url}" target="_blank" download class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-primary/10 transition-colors" title="Download">
                                        <iconify-icon icon="solar:cloud-download-bold" class="text-zinc-700 group-hover/asset:text-primary"></iconify-icon>
                                    </a>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function toggleAssetPreview(id) {
            const preview = document.getElementById(`folder-preview-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            if (!preview || !arrow) return;

            document.querySelectorAll('[id^="folder-preview-"]').forEach(el => {
                if (el.id !== `folder-preview-${id}`) el.classList.add('hidden');
            });

            document.querySelectorAll('[id^="arrow-"]').forEach(el => {
                if (el.id !== `arrow-${id}`) el.style.transform = 'rotate(0deg)';
            });

            const isHidden = preview.classList.contains('hidden');
            if (isHidden) {
                preview.classList.remove('hidden');
                arrow.style.transform = 'rotate(180deg)';
            } else {
                preview.classList.add('hidden');
                arrow.style.transform = 'rotate(0deg)';
            }
        }

        function openSpecificAsset(assetUrl, assetType, djName, shotLabel, format) {
            const container = document.getElementById('preview-container');
            const displayArea = document.getElementById('asset-display-area');
            const title = document.getElementById('vault-dj-title');
            const meta = document.getElementById('vault-venue-meta');
            if (!container || !displayArea || !title || !meta) return;

            title.textContent = (djName || 'UNKNOWN').toUpperCase();
            meta.textContent = `${shotLabel || 'ASSET'} // ${format || 'FILE'} FORMAT`;

            displayArea.innerHTML = '';

            if (assetType === 'MASTER' || assetType === 'SOCIAL') {
                displayArea.innerHTML = `
                    <div class="space-y-4">
                        <div class="aspect-video bg-black rounded-3xl overflow-hidden border border-white/5">
                            <video src="${assetUrl}" class="w-full h-full object-cover" controls autoplay playsinline></video>
                        </div>
                        <div class="flex gap-4">
                            <a href="${assetUrl}" target="_blank" download class="flex-1 bg-white text-black font-black py-4 rounded-xl text-center text-[10px] uppercase tracking-widest hover:bg-primary transition-all">DOWNLOAD ${assetType === 'MASTER' ? '4K MASTER' : 'SOCIAL CLIP'}</a>
                        </div>
                    </div>`;
            } else if (assetType === 'AUDIO') {
                displayArea.innerHTML = `
                    <div class="space-y-4">
                        <div class="bg-black rounded-3xl overflow-hidden border border-white/5 p-6">
                            <audio src="${assetUrl}" class="w-full" controls autoplay></audio>
                        </div>
                        <div class="flex gap-4">
                            <a href="${assetUrl}" target="_blank" download class="flex-1 bg-white text-black font-black py-4 rounded-xl text-center text-[10px] uppercase tracking-widest hover:bg-primary transition-all">DOWNLOAD HQ AUDIO</a>
                        </div>
                    </div>`;
            } else if (assetType === 'THUMB' || ['JPG', 'JPEG', 'PNG', 'WEBP', 'GIF'].includes(format)) {
                displayArea.innerHTML = `
                    <div class="space-y-4">
                        <img src="${assetUrl}" class="w-full aspect-video object-cover rounded-3xl border border-white/5 shadow-2xl" alt="Thumbnail preview">
                        <div class="flex gap-4">
                            <a href="${assetUrl}" target="_blank" download class="flex-1 bg-white text-black font-black py-4 rounded-xl text-center text-[10px] uppercase tracking-widest hover:bg-primary transition-all">DOWNLOAD THUMBNAIL</a>
                        </div>
                    </div>`;
            } else {
                displayArea.innerHTML = `
                    <div class="space-y-4">
                        <div class="bg-black rounded-3xl overflow-hidden border border-white/5 p-6 text-[10px] font-mono text-zinc-400 uppercase tracking-widest">Preview not available for this format.</div>
                        <div class="flex gap-4">
                            <a href="${assetUrl}" target="_blank" download class="flex-1 bg-white text-black font-black py-4 rounded-xl text-center text-[10px] uppercase tracking-widest hover:bg-primary transition-all">DOWNLOAD FILE</a>
                        </div>
                    </div>`;
            }

            container.classList.remove('hidden');
            container.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function previewAssetByKey(encodedKey) {
            const key = decodeURIComponent(encodedKey);
            const asset = cloudAssets.find(item => item.key === key);
            if (!asset) return;
            openSpecificAsset(asset.url, asset.assetType, asset.dj, asset.shot, asset.format);
        }

        function closePreview() {
            const container = document.getElementById('preview-container');
            const displayArea = document.getElementById('asset-display-area');
            if (displayArea) displayArea.innerHTML = '';
            container.classList.add('hidden');
        }
    </script>
</body>
</html>
