    <script>
        let datePicker = null;

        function initDatePicker() {
            var el = document.getElementById('ingest-date');
            if (!el) return false;
            if (typeof flatpickr !== 'function') return false;
            datePicker = flatpickr(el, {
                defaultDate: new Date(),
                dateFormat: 'd M Y',
                theme: 'dark',
                disableMobile: true,
                allowInput: false,
                appendTo: document.body,
                clickOpens: true,
                onReady: function(selectedDates, dateStr, instance) {
                    const date = selectedDates?.[0] || instance.latestSelectedDateObj || new Date();
                    el.dataset.iso = instance.formatDate(date, 'Y-m-d');
                    if (!el.value) {
                        el.value = instance.formatDate(date, instance.config.dateFormat);
                    }
                },
                onChange: function(selectedDates, dateStr, instance) {
                    const date = selectedDates?.[0];
                    if (date) {
                        el.dataset.iso = instance.formatDate(date, 'Y-m-d');
                    }
                }
            });
            console.log('flatpickr initialized OK');
            return true;
        }
    </script>

    <script>

        let cloudAssets = [];

        const API_KEY_OVERRIDE = (window.LOCAL_ASSETS_API_KEY || localStorage.getItem('LOCAL_ASSETS_API_KEY') || '').trim();
        const WORKER_URL_OVERRIDE = (window.LOCAL_ASSETS_WORKER_URL || localStorage.getItem('LOCAL_ASSETS_WORKER_URL') || '').trim();
        const CONFIG = {
            // Temporarily use default Worker URL for testing
            WORKER_URL: WORKER_URL_OVERRIDE || "https://cloud.local-assets.com",
            API_KEY: API_KEY_OVERRIDE || "1mmm9dZ1MIl5xkiqlal_gBF5IqpNy_3M2WjQOiNU"
        };

        function getIngestDateValue() {
            const el = document.getElementById('ingest-date');
            if (!el) return '';
            if (el.dataset?.iso) return el.dataset.iso;
            const raw = el.value?.trim() || '';
            if (!raw && datePicker?.selectedDates?.length) {
                return datePicker.formatDate(datePicker.selectedDates[0], 'Y-m-d');
            }
            return raw;
        }

        document.addEventListener('DOMContentLoaded', function() {
            // Try immediately, then retry a few times in case flatpickr CDN is slow
            if (!initDatePicker()) {
                var attempts = 0;
                var timer = setInterval(function() {
                    attempts++;
                    if (initDatePicker() || attempts >= 20) {
                        clearInterval(timer);
                        if (attempts >= 20) {
                            console.warn('flatpickr never loaded, using native date input');
                            var el = document.getElementById('ingest-date');
                            if (el) {
                                const iso = new Date().toISOString().slice(0, 10);
                                el.type = 'date';
                                el.readOnly = false;
                                el.value = iso;
                                el.dataset.iso = iso;
                            }
                        }
                    }
                }, 200);
            }

            const ingestDateEl = document.getElementById('ingest-date');
            if (ingestDateEl) {
                ingestDateEl.addEventListener('change', function() {
                    if (ingestDateEl.value) ingestDateEl.dataset.iso = ingestDateEl.value;
                });
            }

            fetchCloudLibrary();
            setupUploadHandler();
        });

        function setupUploadHandler() {
            const uploadBtn = document.getElementById('upload-btn');
            
            // File Inputs
            const inputs = {
                video: document.getElementById('file-video'),
                audio: document.getElementById('file-audio'),
                social: document.getElementById('file-social'),
                marketing: document.getElementById('file-marketing')
            };

            // Update UI when files are selected
            Object.keys(inputs).forEach(key => {
                inputs[key].addEventListener('change', () => {
                    const card = document.getElementById(`card-${key}`);
                    if (inputs[key].files.length > 0) {
                        card.style.borderColor = '#39FF14';
                        card.style.background = 'rgba(57,255,20,0.05)';
                    }
                });
            });

            uploadBtn.onclick = async function() {
                const djName = document.getElementById('ingest-name').value.trim();
                const date = getIngestDateValue();

                if (!djName || !date) {
                    alert('CRITICAL: DJ NAME & DATE REQUIRED');
                    return;
                }

                if (!CONFIG.API_KEY || CONFIG.API_KEY === 'your_secret_key_here') {
                    alert('Missing API key. Set LOCAL_ASSETS_API_KEY in localStorage or update CONFIG.API_KEY.');
                    return;
                }

                uploadBtn.disabled = true;
                uploadBtn.innerHTML = `<span class="animate-pulse text-primary">INITIALIZING ENCRYPTED UPLOAD...</span>`;

                const safeDj = djName.toLowerCase().replace(/[^a-z0-9]+/g, '_');
                const safeDate = date.replace(/-/g, '');

                // Gather all selected files
                const filesToUpload = [];
                if (inputs.video.files[0]) {
                    const ext = (inputs.video.files[0].name.split('.').pop() || 'mov').toLowerCase();
                    filesToUpload.push({ file: inputs.video.files[0], path: `venue_masters/${safeDj}/masters/${safeDate}_main.${ext}` });
                }
                if (inputs.audio.files[0]) {
                    const ext = (inputs.audio.files[0].name.split('.').pop() || 'wav').toLowerCase();
                    filesToUpload.push({ file: inputs.audio.files[0], path: `venue_masters/${safeDj}/audio/${safeDate}_master.${ext}` });
                }
                
                // Handle Multiple Social Clips
                Array.from(inputs.social.files).forEach((file, i) => {
                    const ext = (file.name.split('.').pop() || 'mp4').toLowerCase();
                    filesToUpload.push({ file, path: `venue_masters/${safeDj}/social-suite/clip_${i+1}.${ext}` });
                });

                // Handle Marketing Thumbnails
                Array.from(inputs.marketing.files).forEach((file, i) => {
                    const ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
                    filesToUpload.push({ file, path: `venue_masters/${safeDj}/marketing/thumb_${i+1}.${ext}` });
                });

                if (filesToUpload.length === 0) {
                    uploadBtn.innerHTML = "UPLOAD FAILED - NO FILES";
                    uploadBtn.disabled = false;
                    alert('Please select at least one file to upload.');
                    return;
                }

                try {
                    for (const item of filesToUpload) {
                        uploadBtn.innerHTML = `UPLOADING: ${item.file.name.substring(0,15)}...`;
                        
                        // 1. Get Presigned URL
                        const contentType = item.file.type || 'application/octet-stream';
                        const presignReq = await fetch(`${CONFIG.WORKER_URL}/presign-upload?file=${encodeURIComponent(item.path)}&type=${encodeURIComponent(contentType)}`, {
                            headers: { 'x-api-key': CONFIG.API_KEY }
                        });
                        if (!presignReq.ok) {
                            const text = await presignReq.text();
                            throw new Error(`Presign failed: ${text}`);
                        }

                        const { url: signedUrl } = await presignReq.json();

                        // 2. Direct Upload to Cloudflare R2 using XMLHttpRequest to track progress
                        await new Promise((resolve, reject) => {
                            const xhr = new XMLHttpRequest();
                            xhr.open('PUT', signedUrl);
                            xhr.setRequestHeader('Content-Type', contentType);
                            
                            xhr.upload.onprogress = (e) => {
                                if (e.lengthComputable) {
                                    const percent = Math.round((e.loaded / e.total) * 100);
                                    uploadBtn.innerHTML = `INGESTING: ${percent}%`;
                                }
                            };

                            xhr.onload = () => xhr.status === 200 ? resolve() : reject(new Error(`Upload failed: ${xhr.status}`));
                            xhr.onerror = () => reject(new Error('Upload failed: network error'));
                            xhr.send(item.file);
                        });
                    }

                    uploadBtn.innerHTML = "SESSION INGEST COMPLETE";
                    uploadBtn.style.backgroundColor = "#39FF14";
                    setTimeout(() => location.reload(), 2000);

                } catch (err) {
                    console.error(err);
                    uploadBtn.innerHTML = "UPLOAD FAILED - RETRY";
                    uploadBtn.disabled = false;
                }
            };
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.add('opacity-100'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        async function fetchCloudLibrary() {
            try {
                const response = await fetch(`${CONFIG.WORKER_URL}/list`);
                const data = await response.json();
                const hiddenSlugs = new Set(['test_artist', 'debug_api']);

                cloudAssets = Array.isArray(data)
                    ? data.filter((artist) => !hiddenSlugs.has(String(artist?.slug || '').toLowerCase()))
                    : [];
                renderList(cloudAssets);
            } catch (e) {
                console.error("Could not load library:", e);
            }
        }

        function getIcon(type) {
            if (type === 'MASTERS') return 'solar:play-bold';
            if (type === 'AUDIO') return 'solar:music-note-bold';
            if (type === 'SOCIAL-SUITE') return 'solar:iphone-bold';
            if (type === 'VERTICALS') return 'solar:iphone-bold';
            if (type === 'MARKETING') return 'solar:gallery-bold';
            return 'solar:document-bold';
        }

        function groupAssetsByType(assets) {
            return (assets || []).reduce((acc, asset) => {
                const key = (asset?.type || 'MISC').toUpperCase();
                if (!acc[key]) acc[key] = [];
                acc[key].push(asset);
                return acc;
            }, {});
        }

        function getCategorySortOrder(type) {
            const t = String(type || '').toUpperCase();
            if (t === 'MASTERS' || t === 'MASTER') return 0;
            if (t === 'AUDIO') return 1;
            if (t === 'MARKETING' || t === 'THUMB') return 2;
            return 99;
        }

        function slugifyId(value) {
            return String(value || '')
                .toLowerCase()
                .replace(/[^a-z0-9_-]+/g, '-')
                .replace(/^-+|-+$/g, '');
        }

        function formatBytes(bytes) {
            const size = Number(bytes);
            if (!Number.isFinite(size) || size <= 0) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            const power = Math.min(Math.floor(Math.log(size) / Math.log(1024)), units.length - 1);
            const value = size / (1024 ** power);
            const fixed = value >= 100 || power === 0 ? 0 : 1;
            return `${value.toFixed(fixed)} ${units[power]}`;
        }

        function renderCategory(type, assets, artistName) {
            if (!assets?.length) return '';
            let cleanLabel = type;
            if (type === 'MASTERS' || type === 'MASTER') cleanLabel = 'MASTER 4K SET';
            else if (type === 'AUDIO') cleanLabel = 'HQ AUDIO MASTER (.WAV)';
            else cleanLabel = (assets[0]?.key || '').toLowerCase().includes('thumb') ? 'THUMBNAILS' : 'VERTICALS';
            return `
                <div onclick="focusCategoryEncoded('${encodeURIComponent(type)}', '${encodeURIComponent(artistName)}')" class="p-4 pl-14 flex items-center justify-between hover:bg-white/[0.03] group/cat cursor-pointer">
                    <div class="flex items-center gap-4">
                        <iconify-icon icon="${getIcon(type)}" class="text-zinc-600 group-hover/cat:text-primary"></iconify-icon>
                        <span class="text-[10px] font-mono text-zinc-400 uppercase tracking-widest">${cleanLabel}${assets.length > 1 ? ` ${assets.length}` : ''}</span>
                    </div>
                    <iconify-icon icon="solar:alt-arrow-right-linear" class="text-zinc-800 group-hover/cat:text-primary transition-transform text-xs"></iconify-icon>
                </div>`;
        }

        function renderList(groupedData) {
            const list = document.getElementById('cloud-list') || document.getElementById('recent-sets-list');
            if (!list) return;
            list.innerHTML = '';

            if (!Array.isArray(groupedData) || !groupedData.length) {
                list.innerHTML = '<div class="p-4 text-[10px] font-mono text-zinc-500 uppercase tracking-widest border border-zinc-800 rounded-xl">No known artist uploads yet.</div>';
                return;
            }

            groupedData.forEach(artist => {
                if (!artist?.name || artist.name === 'UNKNOWN') return;
                const artistGroup = groupAssetsByType(artist.assets || []);
                const folderId = `folder-${artist.slug}`;
                const row = document.createElement('div');
                row.className = 'session-group border border-zinc-800 rounded-2xl overflow-hidden bg-card';

                row.innerHTML = `
                    <div onclick="toggleFolder('${folderId}')" class="p-5 flex items-center justify-between hover:bg-white/[0.02] cursor-pointer group">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-zinc-900 border border-zinc-800 flex items-center justify-center rounded-xl group-hover:border-primary/50">
                                <iconify-icon icon="solar:folder-2-bold" class="text-zinc-600 group-hover:text-primary"></iconify-icon>
                            </div>
                            <div>
                                <p class="text-sm font-black text-white uppercase tracking-tight">${artist.name}</p>
                                <p class="text-[9px] font-mono text-zinc-500 uppercase">MASTERS/${artist.name} // ${artist.assets.length} ASSET(S)</p>
                            </div>
                        </div>
                        <iconify-icon id="arrow-${folderId}" icon="solar:alt-arrow-down-linear" class="text-zinc-700 transition-transform"></iconify-icon>
                    </div>

                    <div id="${folderId}" class="hidden bg-black/40 divide-y divide-white/5">
                        ${Object.entries(artistGroup)
                            .sort(([typeA], [typeB]) => {
                                const orderA = getCategorySortOrder(typeA);
                                const orderB = getCategorySortOrder(typeB);
                                if (orderA !== orderB) return orderA - orderB;
                                return String(typeA).localeCompare(String(typeB));
                            })
                            .map(([type, groupedAssets]) => renderCategory(type, groupedAssets, artist.name))
                            .join('')}
                    </div>
                `;

                list.appendChild(row);
            });
        }

        function focusCategoryEncoded(encodedType, encodedArtistName) {
            focusCategory(decodeURIComponent(encodedType), decodeURIComponent(encodedArtistName));
        }

        function getAssetLabel(type, filename, index = null) {
            const name = (filename || '').toLowerCase();
            const base = name.includes('vertical') ? 'VERTICAL' : (name.includes('thumb') ? 'THUMBNAIL' : type);
            return index !== null ? `${base} ${index + 1}` : base;
        }

        function focusCategory(type, artistName) {
            const artist = cloudAssets.find(a => a.name === artistName);
            const assets = artist.assets.filter(a => a.type === type.toUpperCase());
            
            if (!assets.length) return;

            if (assets.length === 1) {
                // RULE: If only one file, skip list and autoplay immediately
                const asset = assets[0];
                const url = `${CONFIG.WORKER_URL}/asset?key=${encodeURIComponent(asset.key)}`;
                openAssetPreview(url, type, artistName, 'MOV');
            } else {
                // RULE: Show the numbered list
                renderNumberedList(type, artistName, assets);
            }
        }

        function renderNumberedList(type, artistName, assets) {
            const container = document.getElementById('preview-container');
            const displayArea = document.getElementById('active-asset-display');
            const title = document.getElementById('vault-dj-title');
            const meta = document.getElementById('vault-meta');
            if (!container || !displayArea || !title || !meta) return;

            const labelBase = getAssetLabel(type, assets[0]?.key || '');
            title.textContent = (artistName || 'UNKNOWN').toUpperCase();
            title.className = 'artist-hero-title';
            meta.textContent = `${labelBase} SUITE // ${assets.length} ASSET(S)`;

            container.classList.remove('hidden', 'opacity-0');
            displayArea.innerHTML = `
                <div class="space-y-4 max-w-3xl mx-auto">
                    <h3 class="text-[10px] font-mono text-zinc-500 uppercase tracking-[0.4em] mb-6">// ${labelBase} SUITE</h3>
                    ${assets.map((asset, i) => {
                        const format = (asset.format || (asset.key || '').split('.').pop() || 'FILE').toUpperCase();
                        const assetUrl = `${CONFIG.WORKER_URL}/asset?key=${encodeURIComponent(asset.key || '')}`;
                        const itemLabel = getAssetLabel(type, asset.key, i);
                        return `
                            <div onclick="openAssetPreviewEncoded('${encodeURIComponent(assetUrl)}', '${type}', '${encodeURIComponent(artistName)}', '${format}')" class="flex items-center justify-between p-5 bg-[#0a0a0a] border border-zinc-800 rounded-2xl hover:border-primary cursor-pointer group transition-all">
                                <span class="text-[9px] font-mono text-zinc-500 uppercase">${itemLabel}</span>
                                <iconify-icon icon="solar:play-circle-bold" class="text-xl text-zinc-700 group-hover:text-primary"></iconify-icon>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;

            displayArea.scrollIntoView({ behavior: 'smooth' });
        }

        function toggleFolder(folderId) {
            const preview = document.getElementById(folderId);
            const arrow = document.getElementById(`arrow-${folderId}`);
            if (!preview || !arrow) return;

            document.querySelectorAll('[id^="folder-"]').forEach(el => {
                if (el.id !== folderId) el.classList.add('hidden');
            });

            document.querySelectorAll('iconify-icon[id^="arrow-folder-"]').forEach(el => {
                if (el.id !== `arrow-${folderId}`) el.style.transform = 'rotate(0deg)';
            });

            const isHidden = preview.classList.contains('hidden');
            if (isHidden) {
                preview.classList.remove('hidden');
                arrow.style.transform = 'rotate(180deg)';
            } else {
                preview.classList.add('hidden');
                arrow.style.transform = 'rotate(0deg)';
            }
        }

        function openAssetPreviewEncoded(encodedUrl, type, encodedName, format) {
            openAssetPreview(decodeURIComponent(encodedUrl), type, decodeURIComponent(encodedName), format);
        }

        function openAssetPreview(assetUrl, assetType, djName, format) {
            const container = document.getElementById('preview-container');
            const displayArea = document.getElementById('active-asset-display');
            const title = document.getElementById('vault-dj-title');
            const meta = document.getElementById('vault-meta');
            if (!container || !displayArea || !title || !meta) return;

            const upperName = (djName || 'UNKNOWN').toUpperCase();
            title.textContent = upperName;
            title.className = 'artist-hero-title';
            meta.textContent = `UPLOAD SESSION // ${new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase()}`;

            container.classList.remove('hidden', 'opacity-0');
            displayArea.innerHTML = '';

            if (assetType === 'MASTERS' || assetType === 'MASTER') {
                displayArea.innerHTML = `
                    <div class="space-y-6">
                        <p class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-[#39FF14] animate-pulse"></span> MASTER 4K SET
                        </p>
                        <div class="aspect-video bg-black rounded-[40px] overflow-hidden border border-white/5 shadow-2xl">
                            <video src="${assetUrl}" class="w-full h-full object-cover" controls autoplay></video>
                        </div>
                        <a href="${assetUrl}" target="_blank" download class="w-full bg-white text-black font-black py-5 rounded-2xl text-[11px] uppercase tracking-widest text-center block">DOWNLOAD 4K MASTER (.MOV)</a>
                    </div>`;
            } else if (assetType === 'AUDIO') {
                displayArea.innerHTML = `
                    <div class="space-y-6 animate-in fade-in duration-500">
                        <p class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-primary"></span> HQ AUDIO MASTER (.WAV)
                        </p>

                        <div class="audio-player-wrapper">
                            <audio src="${assetUrl}" controls preload="metadata"></audio>
                        </div>

                        <a href="${assetUrl}" target="_blank" download class="w-full bg-white text-black font-black py-5 rounded-2xl text-[11px] uppercase tracking-widest text-center block hover:bg-primary transition-all">
                            DOWNLOAD HQ AUDIO
                        </a>
                    </div>`;
            } else if (assetType === 'MARKETING' || assetType === 'THUMB' || ['PNG', 'JPG', 'JPEG', 'WEBP', 'GIF'].includes(format)) {
                displayArea.innerHTML = `
                    <div class="space-y-6">
                        <p class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-[#39FF14]"></span> MARKETING THUMBNAIL
                        </p>
                        <img src="${assetUrl}" class="w-full aspect-video object-cover rounded-[40px] border border-white/10 shadow-2xl" alt="Marketing preview">
                        <a href="${assetUrl}" target="_blank" download class="w-full bg-white text-black font-black py-5 rounded-2xl text-[11px] uppercase tracking-widest text-center block">DOWNLOAD MARKETING ASSET</a>
                    </div>`;
            } else {
                displayArea.innerHTML = `
                    <div class="space-y-6">
                        <div class="bg-black rounded-[32px] overflow-hidden border border-white/5 p-6 text-[10px] font-mono text-zinc-400 uppercase tracking-widest">Preview not available for this format.</div>
                        <a href="${assetUrl}" target="_blank" download class="w-full bg-white text-black font-black py-5 rounded-2xl text-[11px] uppercase tracking-widest text-center block">DOWNLOAD FILE</a>
                    </div>`;
            }

            displayArea.scrollIntoView({ behavior: 'smooth' });
        }

        function closePreview() {
            const container = document.getElementById('preview-container');
            const displayArea = document.getElementById('active-asset-display');
            const historyList = document.getElementById('recent-sets-list') || document.getElementById('cloud-list');
            if (!container || !displayArea) return;

            container.classList.add('opacity-0');

            setTimeout(() => {
                container.classList.add('hidden');
                container.classList.remove('opacity-0');
                displayArea.innerHTML = '';
                if (historyList) historyList.scrollIntoView({ behavior: 'smooth' });
            }, 300);
        }
    </script>
</body>
</html>
