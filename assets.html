<!DOCTYPE html>
<html lang="en" class="dark scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>local / assets™</title>
    <link rel="stylesheet" href="/styles/tailwind.css">
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <script src="/nav-component.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        :root { --p: 40px; --neon: #39FF14; }
        body { background-color: #050505 !important; color: white; font-family: 'JetBrains Mono', monospace; overflow-x: hidden; }
        .ingest-card { border: 1px dashed #27272a; background: rgba(255,255,255,0.02); border-radius: 24px; padding: var(--p); }
        .upload-node { background: #000; border: 1px solid #1a1a1a; border-radius: 16px; transition: all 0.3s ease; cursor: pointer; }
        .upload-node.active { border-color: var(--neon); background: rgba(57,255,20,0.1); }
        .vault-card { background: #000; border: 1px solid #111; border-radius: 24px; margin-bottom: 24px; overflow: hidden; }
        .vault-card.expanded { border-color: var(--neon); }
        .vault-card-header { display: flex; align-items: center; justify-content: space-between; padding: 32px var(--p); cursor: pointer; }
        .asset-tray { max-height: 0; overflow: hidden; transition: all 0.5s ease; background: rgba(0,0,0,0.3); }
        .vault-card.expanded .asset-tray { max-height: 800px; padding: 0 var(--p) 40px var(--p); }
        .sleek-flap { writing-mode: vertical-rl; transform: rotate(180deg); letter-spacing: 0.3em; font-size: 10px; font-weight: 800; }
    </style>
</head>
<body class="flex h-screen w-screen selection:bg-primary">

    <button onclick="toggleSidebar()" class="md:hidden fixed left-0 top-1/2 -translate-y-1/2 z-50 bg-primary text-black py-8 px-1.5 rounded-r-lg border-r border-primary">
        <span class="sleek-flap">MENU</span>
    </button>

    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/90 z-40 hidden backdrop-blur-md transition-opacity"></div>
    <aside id="sidebar" class="w-64 border-r border-zinc-800 bg-[#0a0a0a] flex flex-col transform -translate-x-full md:relative md:translate-x-0 transition-transform h-full"></aside>

    <main class="flex-1 flex flex-col overflow-hidden bg-background">
        <header class="h-16 flex items-center px-8 border-b border-zinc-800 justify-between">
            <span class="text-primary font-mono text-[9px] uppercase tracking-[0.4em]">Infrastructure Tier // London</span>
            <div class="flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></span>
                <span class="text-[8px] font-mono text-zinc-500 uppercase">Live Mux Upload Active</span>
            </div>
        </header>

        <div class="flex-1 p-8 overflow-y-auto">
            <div class="max-w-[1200px] mx-auto space-y-12 pb-20">
                <div class="ingest-card space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <input type="text" id="ingest-name" placeholder="DJ / ARTIST NAME" class="bg-black border border-zinc-800 rounded-xl p-4 text-xs font-bold text-white uppercase outline-none focus:border-primary">
                        <input type="text" id="ingest-date" placeholder="SELECT DATE" class="bg-black border border-zinc-800 rounded-xl p-4 text-xs font-bold text-white outline-none">
                        <select id="ingest-shot" class="bg-black border border-zinc-800 rounded-xl p-4 text-xs text-zinc-400 font-bold uppercase outline-none">
                            <option value="MASTER">MASTER CAM</option>
                        </select>
                    </div>
                    <label class="upload-node p-12 flex flex-col items-center justify-center gap-2" id="node-video">
                        <iconify-icon icon="solar:videocamera-record-bold" class="text-3xl text-zinc-600"></iconify-icon>
                        <span class="text-[9px] font-mono uppercase text-zinc-500">Drop 4K Master (.MOV)</span>
                        <input type="file" id="file-video" class="hidden" accept="video/*" onchange="markActive('video')">
                    </label>
                    <button id="upload-btn" class="w-full bg-white text-black font-black py-5 rounded-2xl uppercase tracking-[0.2em] text-[11px] hover:bg-primary transition-all">INGEST FULL SESSION</button>
                </div>

                <div id="preview-container" class="hidden border-b border-zinc-800 pb-12">
                    <div id="active-asset-display" class="max-w-4xl mx-auto"></div>
                </div>

                <div class="space-y-4">
                    <h3 class="text-[10px] font-mono text-zinc-600 uppercase tracking-[0.3em] border-b border-zinc-800 pb-2">Vault History</h3>
                    <div id="cloud-list" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </main>

<script>
    window.toggleSidebar = () => {
        document.getElementById('sidebar').classList.toggle('-translate-x-full');
        document.getElementById('sidebar-overlay').classList.toggle('hidden');
    };

    window.markActive = (type) => document.getElementById('node-' + type)?.classList.add('active');

    window.onload = function() {
        flatpickr("#ingest-date", { defaultDate: "today", theme: "dark" });
        loadVault();
        
        const uploadBtn = document.getElementById('upload-btn');
        uploadBtn.onclick = async function() {
            const file = document.getElementById('file-video').files[0];
            const artist = document.getElementById('ingest-name').value;
            if (!file || !artist) return alert("Artist and File are required.");

            uploadBtn.disabled = true;
            uploadBtn.innerHTML = "PREPARING VAULT...";

            try {
                // UPDATE: Sending artist name to labeling API
                const response = await fetch(`/api/get-upload-url?artistName=${encodeURIComponent(artist)}`, { method: 'POST' });
                const data = await response.json();
                
                const xhr = new XMLHttpRequest();
                xhr.open('PUT', data.url);
                xhr.upload.onprogress = (e) => {
                    const pct = Math.round((e.loaded / e.total) * 100);
                    uploadBtn.innerHTML = `UPLOADING: ${pct}%`;
                };
                xhr.onload = () => {
                    uploadBtn.innerHTML = "INGEST COMPLETE";
                    uploadBtn.style.background = "#39FF14";
                    setTimeout(loadVault, 4000); 
                };
                xhr.send(file);
            } catch (err) {
                alert("ERROR: " + err.message);
                uploadBtn.disabled = false;
            }
        };
    };

    async function loadVault() {
        const list = document.getElementById('cloud-list');
        try {
            const res = await fetch('/api/list-assets');
            const data = await res.json();
            const assets = Array.isArray(data) ? data : (data.data || []);

            list.innerHTML = assets.map((asset, i) => {
                const pid = asset.playback_ids?.[0]?.id;
                const status = asset.status;
                const isReady = status === 'ready';
                // UPDATE: Using Passthrough Name
                const artistTitle = asset.passthrough || asset.id.slice(-6);

                return `
                <div class="vault-card ${isReady ? '' : 'opacity-40'}" id="vault-${i}">
                    <div class="vault-card-header" onclick="toggleVaultFolder(${i})">
                        <div>
                            <h4 class="text-2xl font-black italic uppercase">${artistTitle}</h4>
                            <span class="text-[8px] font-mono ${isReady ? 'text-primary' : 'text-zinc-500'} uppercase">
                                ${status} // ${new Date(asset.created_at * 1000).toLocaleDateString()}
                            </span>
                        </div>
                        <button class="bg-white text-black h-12 w-12 rounded-xl flex items-center justify-center hover:bg-primary transition-all">
                            <iconify-icon icon="solar:play-bold"></iconify-icon>
                        </button>
                    </div>
                    <div class="asset-tray">
                        <div class="flex gap-4 pt-4">
                            ${pid ? `<button class="px-4 py-2 bg-zinc-900 border border-zinc-800 rounded-lg text-[9px] font-black hover:border-primary" 
                                onclick="event.stopPropagation(); showPreview('${pid}')">PLAY SESSION</button>` : ''}
                            <span class="px-4 py-2 bg-zinc-900 border border-zinc-800 rounded-lg text-[9px] font-black text-primary">4K MASTER .MOV</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        } catch (e) {
            list.innerHTML = `<p class="text-red-500 font-mono text-[10px]">VAULT CONNECTION ERROR</p>`;
        }
    }

    window.showPreview = (pid) => {
        const display = document.getElementById('active-asset-display');
        document.getElementById('preview-container').classList.remove('hidden');
        display.innerHTML = `<iframe src="https://player.mux.com/${pid}" style="width:100%;border:none;aspect-ratio:16/9;" allowfullscreen></iframe>`;
        display.scrollIntoView({ behavior: 'smooth' });
    };

    window.toggleVaultFolder = (i) => document.getElementById('vault-' + i).classList.toggle('expanded');
</script>
</body>
</html>
