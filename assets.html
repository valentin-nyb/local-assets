    <script>
        let cloudAssets = [];
        const CONFIG = {
            WORKER_URL: 'https://local-assets-worker.smackeprang-v.workers.dev',
            WORKER_FALLBACK_URL: 'https://local-assets-worker.smackeprang-v.workers.dev'
        };

        window.onload = function() {
            flatpickr("#ingest-date", { defaultDate: "today", dateFormat: "d M Y" });
            fetchCloudLibrary();
            setupUploadHandler();
        };

        function setupUploadHandler() {
            const uploadBtn = document.getElementById('upload-btn');
            const UPLOAD_LIMIT_DIRECT = 100 * 1024 * 1024; // 100 MB
            const MULTIPART_CHUNK_BYTES = 5 * 1024 * 1024;
            const MULTIPART_MAX_RETRIES = 3;
            const REQUEST_TIMEOUT_MS = 60000;

            const fileVideo = document.getElementById('file-video');
            const fileAudio = document.getElementById('file-audio');
            const fileSocial = document.getElementById('file-social');
            const fileMarketing = document.getElementById('file-marketing');

            function setCardSelected(cardId, isSelected) {
                const card = document.getElementById(cardId);
                if (!card) return;

                const icon = card.querySelector('.upload-card-icon');
                const label = card.querySelector('.upload-card-label');

                if (isSelected) {
                    card.classList.add('border-primary', 'bg-primary/10', 'shadow-[0_0_20px_rgba(57,255,20,0.12)]');
                    card.classList.remove('border-zinc-800', 'bg-black');
                    if (icon) icon.classList.replace('text-zinc-600', 'text-primary');
                    if (label) label.classList.replace('text-zinc-500', 'text-primary');
                } else {
                    card.classList.remove('border-primary', 'bg-primary/10', 'shadow-[0_0_20px_rgba(57,255,20,0.12)]');
                    card.classList.add('border-zinc-800', 'bg-black');
                    if (icon) icon.classList.replace('text-primary', 'text-zinc-600');
                    if (label) label.classList.replace('text-primary', 'text-zinc-500');
                }
            }

            fileVideo.addEventListener('change', () => setCardSelected('card-video', fileVideo.files.length > 0));
            fileAudio.addEventListener('change', () => setCardSelected('card-audio', fileAudio.files.length > 0));
            fileSocial.addEventListener('change', () => setCardSelected('card-social', fileSocial.files.length > 0));
            fileMarketing.addEventListener('change', () => setCardSelected('card-marketing', fileMarketing.files.length > 0));

            async function fetchWithTimeout(resource, options = {}, timeoutMs = REQUEST_TIMEOUT_MS) {
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), timeoutMs);

                try {
                    return await fetch(resource, { ...options, signal: controller.signal });
                } catch (err) {
                    if (err?.name === 'AbortError') {
                        throw new Error(`Request timed out after ${Math.round(timeoutMs / 1000)}s`);
                    }
                    throw err;
                } finally {
                    clearTimeout(timer);
                }
            }

            function candidateUrls(pathWithQuery, preferDirect = false) {
                const cleanPath = pathWithQuery.startsWith('/') ? pathWithQuery.substring(1) : pathWithQuery;
                const viaProxy = `${CONFIG.WORKER_URL}/${cleanPath}`;
                const directWorker = `${CONFIG.WORKER_FALLBACK_URL}/${cleanPath}`;
                const urls = preferDirect ? [directWorker, viaProxy] : [viaProxy, directWorker];
                return [...new Set(urls)];
            }

            async function fetchWithFallback(pathWithQuery, options = {}, timeoutMs = REQUEST_TIMEOUT_MS, config = {}) {
                const { retryOnHttpError = false, preferDirect = false } = config;
                let lastError = null;
                const endpointFailures = [];

                for (const url of candidateUrls(pathWithQuery, preferDirect)) {
                    try {
                        const response = await fetchWithTimeout(url, options, timeoutMs);

                        if (!retryOnHttpError || response.ok) {
                            return response;
                        }

                        endpointFailures.push(`${url} => HTTP ${response.status}`);
                    } catch (err) {
                        lastError = err;
                        endpointFailures.push(`${url} => ${err?.message || 'Network failure'}`);
                    }
                }

                if (lastError) {
                    throw new Error(endpointFailures.join(' | ') || lastError.message || 'Failed to fetch');
                }

                throw new Error(endpointFailures.join(' | ') || 'Failed to fetch');
            }

            async function uploadMultipartFile(file, fileName, fileType, queueIndex, queueTotal) {
                const startResponse = await fetchWithFallback(`/multipart/start?file=${encodeURIComponent(fileName)}&type=${encodeURIComponent(fileType)}`, {
                    method: 'POST'
                }, REQUEST_TIMEOUT_MS, { retryOnHttpError: true, preferDirect: true });

                if (!startResponse.ok) {
                    const startText = await startResponse.text();
                    throw new Error(`Multipart start failed (${startResponse.status}): ${startText || 'No response body'}`);
                }

                const { uploadId } = await startResponse.json();
                if (!uploadId) {
                    throw new Error('Multipart start did not return an uploadId');
                }

                const totalParts = Math.ceil(file.size / MULTIPART_CHUNK_BYTES);
                const parts = [];

                for (let partNumber = 1; partNumber <= totalParts; partNumber++) {
                    const start = (partNumber - 1) * MULTIPART_CHUNK_BYTES;
                    const end = Math.min(start + MULTIPART_CHUNK_BYTES, file.size);
                    const chunk = file.slice(start, end);

                    let etag = null;
                    let lastError = null;

                    for (let attempt = 1; attempt <= MULTIPART_MAX_RETRIES; attempt++) {
                        uploadBtn.textContent = `UPLOADING (${queueIndex}/${queueTotal}) PART ${partNumber}/${totalParts} (TRY ${attempt}/${MULTIPART_MAX_RETRIES})...`;

                        try {
                            const partResponse = await fetchWithFallback(`/multipart/part?file=${encodeURIComponent(fileName)}&uploadId=${encodeURIComponent(uploadId)}&partNumber=${partNumber}`, {
                                method: 'PUT',
                                body: chunk,
                                headers: { 'Content-Type': 'application/octet-stream' }
                            }, REQUEST_TIMEOUT_MS, { retryOnHttpError: true, preferDirect: true });

                            if (!partResponse.ok) {
                                const partText = await partResponse.text();
                                throw new Error(`Multipart part failed (${partResponse.status}): ${partText || 'No response body'}`);
                            }

                            const partJson = await partResponse.json();
                            etag = partJson.etag;
                            break;
                        } catch (err) {
                            lastError = err;
                            if (attempt < MULTIPART_MAX_RETRIES) {
                                await new Promise(resolve => setTimeout(resolve, attempt * 1000));
                            }
                        }
                    }

                    if (!etag) {
                        throw new Error(lastError?.message || `Multipart part ${partNumber} failed after retries`);
                    }

                    parts.push({ etag, partNumber });
                }

                const completeResponse = await fetchWithFallback(`/multipart/complete?file=${encodeURIComponent(fileName)}&uploadId=${encodeURIComponent(uploadId)}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ parts })
                }, REQUEST_TIMEOUT_MS, { retryOnHttpError: true, preferDirect: true });

                if (!completeResponse.ok) {
                    const completeText = await completeResponse.text();
                    throw new Error(`Multipart complete failed (${completeResponse.status}): ${completeText || 'No response body'}`);
                }
            }

            async function uploadFormFile(file, fileName, fileType) {
                const formData = new FormData();
                formData.append('file', file, file.name);
                formData.append('key', fileName);
                formData.append('type', fileType);

                const formResponse = await fetchWithFallback('/upload', {
                    method: 'POST',
                    body: formData
                }, REQUEST_TIMEOUT_MS * 5, { retryOnHttpError: true, preferDirect: true });

                if (!formResponse.ok) {
                    const formText = await formResponse.text();
                    throw new Error(`Form upload failed (${formResponse.status}): ${formText || 'No response body'}`);
                }
            }

            async function uploadDirectPutFile(file, fileName, fileType) {
                const uploadResponse = await fetchWithFallback(`/upload?file=${encodeURIComponent(fileName)}&type=${encodeURIComponent(fileType)}`, {
                    method: 'PUT',
                    body: file,
                    headers: { 'Content-Type': fileType }
                }, REQUEST_TIMEOUT_MS * 5, { retryOnHttpError: true, preferDirect: true });

                if (!uploadResponse.ok) {
                    const uploadText = await uploadResponse.text();
                    throw new Error(`Direct upload failed (${uploadResponse.status}): ${uploadText || 'No response body'}`);
                }
            }

            uploadBtn.onclick = async function() {
                const djName = document.getElementById('ingest-name').value.trim();
                const date = document.getElementById('ingest-date').value.trim();

                if (!djName || !date) {
                    alert('Please fill in DJ NAME and DATE');
                    return;
                }

                const uploadQueue = [];
                
                if (fileVideo.files.length > 0) uploadQueue.push({ file: fileVideo.files[0], shotType: 'MASTER_CAM' });
                if (fileAudio.files.length > 0) uploadQueue.push({ file: fileAudio.files[0], shotType: 'MASTER_AUDIO' });
                
                for (let i = 0; i < fileSocial.files.length; i++) {
                    uploadQueue.push({ file: fileSocial.files[i], shotType: `SOCIAL_CLIP_${i+1}` });
                }
                
                for (let i = 0; i < fileMarketing.files.length; i++) {
                    uploadQueue.push({ file: fileMarketing.files[i], shotType: `MARKETING_THUMB_${i+1}` });
                }

                if (uploadQueue.length === 0) {
                    alert('Please select at least one file to upload.');
                    return;
                }

                uploadBtn.disabled = true;

                try {
                    const safeDj = djName
                        .toLowerCase()
                        .replace(/[^a-z0-9]+/g, '_')
                        .replace(/^_+|_+$/g, '');
                    const safeDate = date
                        .toLowerCase()
                        .replace(/[^a-z0-9]+/g, '_')
                        .replace(/^_+|_+$/g, '');

                    function getAssetPath(file, type) {
                        const ext = (file.name.split('.').pop() || '').toLowerCase();
                        let subFolder = 'misc';

                        if (['mov', 'mp4', 'webm'].includes(ext)) subFolder = 'masters';
                        if (['wav', 'mp3', 'm4a', 'aac'].includes(ext)) subFolder = 'audio';
                        if ((type || '').startsWith('SOCIAL_CLIP')) subFolder = 'social-suite';
                        if (['png', 'jpg', 'jpeg', 'webp', 'gif'].includes(ext) || (type || '').startsWith('MARKETING_THUMB')) subFolder = 'marketing';

                        const cleanOriginal = file.name
                            .toLowerCase()
                            .replace(/\s+/g, '_')
                            .replace(/[^a-z0-9._-]/g, '');

                        if ((type || '').startsWith('SOCIAL_CLIP')) {
                            const socialIndex = Number(String(type).split('_').pop()) || 1;
                            return `venue_masters/${safeDj}/${subFolder}/asset_${socialIndex}.mov`;
                        }

                        return `venue_masters/${safeDj}/${subFolder}/${safeDate}_${cleanOriginal}`;
                    }

                    let successCount = 0;
                    for (const { file, shotType } of uploadQueue) {
                        const queueIndex = successCount + 1;
                        uploadBtn.textContent = `UPLOADING (${queueIndex}/${uploadQueue.length})...`;
                        const fileType = file.type || 'application/octet-stream';
                        const fileName = getAssetPath(file, shotType);

                        if (file.size < UPLOAD_LIMIT_DIRECT) {
                            uploadBtn.textContent = `UPLOADING (${queueIndex}/${uploadQueue.length}) [DIRECT]...`;
                            try {
                                await uploadDirectPutFile(file, fileName, fileType);
                            } catch (directErr) {
                                uploadBtn.textContent = `RETRYING (${queueIndex}/${uploadQueue.length}) [MULTIPART]...`;
                                await uploadMultipartFile(file, fileName, fileType, queueIndex, uploadQueue.length);
                            }
                        } else {
                            uploadBtn.textContent = `UPLOADING (${queueIndex}/${uploadQueue.length}) [MULTIPART]...`;
                            await uploadMultipartFile(file, fileName, fileType, queueIndex, uploadQueue.length);
                        }

                        successCount++;
                    }
                    
                    alert(`Successfully uploaded ${successCount} files!`);
                    
                    // Reset inputs
                    fileVideo.value = '';
                    fileAudio.value = '';
                    fileSocial.value = '';
                    fileMarketing.value = '';
                    setCardSelected('card-video', false);
                    setCardSelected('card-audio', false);
                    setCardSelected('card-social', false);
                    setCardSelected('card-marketing', false);
                    
                    fetchCloudLibrary();
                } catch (err) {
                    console.error('Upload error:', err);
                    alert('Upload error: ' + err.message);
                } finally {
                    uploadBtn.disabled = false;
                    uploadBtn.textContent = 'PROCESS & INGEST FULL SESSION';
                }
            };
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.classList.add('opacity-100'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        async function fetchCloudLibrary() {
            try {
                const response = await fetch(`${CONFIG.WORKER_URL}/list`);
                const data = await response.json();
                const hiddenSlugs = new Set(['test_artist', 'debug_api']);

                cloudAssets = Array.isArray(data)
                    ? data.filter((artist) => !hiddenSlugs.has(String(artist?.slug || '').toLowerCase()))
                    : [];
                renderList(cloudAssets);
            } catch (e) {
                console.error("Could not load library:", e);
            }
        }

        function getIcon(type) {
            if (type === 'MASTERS') return 'solar:play-bold';
            if (type === 'AUDIO') return 'solar:music-note-bold';
            if (type === 'SOCIAL-SUITE') return 'solar:iphone-bold';
            if (type === 'VERTICALS') return 'solar:iphone-bold';
            if (type === 'MARKETING') return 'solar:gallery-bold';
            return 'solar:document-bold';
        }

        function getAssetLabel(type, filename) {
            const t = (type || '').toUpperCase();
            if (t === 'MASTERS' || t === 'MASTER') return 'MASTER 4K SET';
            if (t === 'AUDIO') return 'HQ AUDIO MASTER (.WAV)';
            if (t === 'SOCIAL-SUITE' || t === 'VERTICALS') return 'MARKETING VERTICALS';
            if (t === 'MARKETING') return 'MARKETING THUMBNAIL';
            return 'ASSET';
        }

        function groupAssetsByType(assets) {
            return (assets || []).reduce((acc, asset) => {
                const key = (asset?.type || 'MISC').toUpperCase();
                if (!acc[key]) acc[key] = [];
                acc[key].push(asset);
                return acc;
            }, {});
        }

        function getCategorySortOrder(type) {
            const t = String(type || '').toUpperCase();
            if (t === 'MASTERS' || t === 'MASTER') return 0;
            if (t === 'AUDIO') return 1;
            if (t === 'MARKETING' || t === 'THUMB') return 2;
            return 99;
        }

        function slugifyId(value) {
            return String(value || '')
                .toLowerCase()
                .replace(/[^a-z0-9_-]+/g, '-')
                .replace(/^-+|-+$/g, '');
        }

        function formatBytes(bytes) {
            const size = Number(bytes);
            if (!Number.isFinite(size) || size <= 0) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            const power = Math.min(Math.floor(Math.log(size) / Math.log(1024)), units.length - 1);
            const value = size / (1024 ** power);
            const fixed = value >= 100 || power === 0 ? 0 : 1;
            return `${value.toFixed(fixed)} ${units[power]}`;
        }

        function renderCategory(type, assets, artistName) {
            if (!assets?.length) return '';
            const cleanLabel = getAssetLabel(type, assets[0]?.key || '');
            const normalizedType = String(type || '').toUpperCase();

            if (normalizedType === 'SOCIAL-SUITE' || normalizedType === 'VERTICALS') {
                return `
                    <div onclick="openVerticalSuite('${artistName}', ${JSON.stringify(assets).replace(/"/g, '&quot;')})" 
                         class="p-4 pl-14 flex items-center justify-between hover:bg-white/[0.03] group/cat cursor-pointer">
                        <div class="flex items-center gap-4">
                            <iconify-icon icon="solar:folder-with-files-bold" class="text-zinc-700 group-hover/cat:text-primary"></iconify-icon>
                            <span class="text-[10px] font-mono text-zinc-400 uppercase tracking-widest">${cleanLabel} (${assets.length})</span>
                        </div>
                        <iconify-icon icon="solar:alt-arrow-right-linear" class="text-zinc-800 group-hover/cat:text-primary transition-transform text-xs"></iconify-icon>
                    </div>`;
            }

            return `
                <div onclick="focusCategoryEncoded('${encodeURIComponent(type)}', '${encodeURIComponent(artistName)}')" 
                     class="p-4 pl-14 flex items-center justify-between hover:bg-white/[0.03] group/cat cursor-pointer">
                    <div class="flex items-center gap-4">
                        <iconify-icon icon="${getIcon(type)}" class="text-zinc-600 group-hover/cat:text-primary"></iconify-icon>
                        <span class="text-[10px] font-mono text-zinc-400 uppercase tracking-widest">${cleanLabel}</span>
                    </div>
                    <iconify-icon icon="solar:alt-arrow-right-linear" class="text-zinc-800 group-hover/cat:text-primary transition-transform text-xs"></iconify-icon>
                </div>`;
        }

        function renderList(groupedData) {
            const list = document.getElementById('cloud-list') || document.getElementById('recent-sets-list');
            if (!list) return;
            list.innerHTML = '';

            if (!Array.isArray(groupedData) || !groupedData.length) {
                list.innerHTML = '<div class="p-4 text-[10px] font-mono text-zinc-500 uppercase tracking-widest border border-zinc-800 rounded-xl">No known artist uploads yet.</div>';
                return;
            }

            groupedData.forEach(artist => {
                if (!artist?.name || artist.name === 'UNKNOWN') return;

                const artistGroup = groupAssetsByType(artist.assets || []);

                const folderId = `folder-${artist.slug}`;
                const row = document.createElement('div');
                row.className = 'session-group border border-zinc-800 rounded-2xl overflow-hidden bg-card';

                row.innerHTML = `
                    <div onclick="toggleFolder('${folderId}')" class="p-5 flex items-center justify-between hover:bg-white/[0.02] cursor-pointer group">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-zinc-900 border border-zinc-800 flex items-center justify-center rounded-xl group-hover:border-primary/50">
                                <iconify-icon icon="solar:folder-2-bold" class="text-zinc-600 group-hover:text-primary"></iconify-icon>
                            </div>
                            <div>
                                <p class="text-sm font-black text-white uppercase tracking-tight">${artist.name}</p>
                                <p class="text-[9px] font-mono text-zinc-500 uppercase">MASTERS/${artist.name} // ${artist.assets.length} ASSET(S)</p>
                            </div>
                        </div>
                        <iconify-icon id="arrow-${folderId}" icon="solar:alt-arrow-down-linear" class="text-zinc-700 transition-transform"></iconify-icon>
                    </div>

                    <div id="${folderId}" class="hidden bg-black/40 divide-y divide-white/5">
                        ${Object.entries(artistGroup)
                            .sort(([typeA], [typeB]) => {
                                const orderA = getCategorySortOrder(typeA);
                                const orderB = getCategorySortOrder(typeB);
                                if (orderA !== orderB) return orderA - orderB;
                                return String(typeA).localeCompare(String(typeB));
                            })
                            .map(([type, assets]) => renderCategory(type, assets, artist.name))
                            .join('')}
                    </div>
                `;

                list.appendChild(row);
            });
        }

        function focusCategoryEncoded(encodedType, encodedArtistName) {
            focusCategory(decodeURIComponent(encodedType), decodeURIComponent(encodedArtistName));
        }

        function focusCategory(type, artistName) {
            const normalizedType = (type || '').toUpperCase();
            const artist = (cloudAssets || []).find(a => (a?.name || '').toUpperCase() === (artistName || '').toUpperCase());
            const assets = (artist?.assets || []).filter(asset => (asset?.type || '').toUpperCase() === normalizedType);

            if (!assets.length) return;

            if (normalizedType === 'MASTERS' || normalizedType === 'MASTER') {
                const master = assets[0];
                const format = (master.format || (master.key || '').split('.').pop() || 'FILE').toUpperCase();
                const assetUrl = `${CONFIG.WORKER_URL}/asset?key=${encodeURIComponent(master.key || '')}`;
                openAssetPreview(assetUrl, normalizedType, artistName, format);
                return;
            }

            if (normalizedType === 'SOCIAL-SUITE' || normalizedType === 'VERTICALS') {
                openVerticalSuite(artistName, assets);
                return;
            }

            const container = document.getElementById('preview-container');
            const displayArea = document.getElementById('active-asset-display');
            const title = document.getElementById('vault-dj-title');
            const meta = document.getElementById('vault-meta');
            if (!container || !displayArea || !title || !meta) return;

            title.textContent = (artistName || 'UNKNOWN').toUpperCase();
            title.className = 'artist-hero-title';

            const cleanLabel = getAssetLabel(normalizedType, assets[0]?.key || '');
            meta.textContent = `${cleanLabel} // ${assets.length} ASSET(S)`;

            container.classList.remove('hidden', 'opacity-0');
            displayArea.innerHTML = `
                <div class="space-y-6">
                    <p class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest flex items-center gap-2">
                        <span class="w-1.5 h-1.5 rounded-full bg-primary"></span> ${cleanLabel}
                    </p>
                    <div class="divide-y divide-zinc-800 border border-zinc-800 rounded-2xl overflow-hidden bg-black/40">
                        ${assets.map((asset, index) => {
                            const format = (asset.format || (asset.key || '').split('.').pop() || 'FILE').toUpperCase();
                            const assetUrl = `${CONFIG.WORKER_URL}/asset?key=${encodeURIComponent(asset.key || '')}`;

                            return `
                                <div class="p-4 flex items-center justify-between gap-3 hover:bg-white/[0.02]">
                                    <div class="min-w-0 flex items-center gap-3">
                                        <iconify-icon icon="${getIcon(normalizedType)}" class="text-zinc-600"></iconify-icon>
                                        <div>
                                            <p class="text-[9px] font-mono text-zinc-300 uppercase tracking-widest">Asset ${index + 1}</p>
                                            <p class="text-[9px] font-mono text-zinc-500 uppercase tracking-widest">${format} // ${formatBytes(asset.size)}</p>
                                        </div>
                                    </div>
                                    <button onclick="openAssetPreviewEncoded('${encodeURIComponent(assetUrl)}', '${normalizedType}', '${encodeURIComponent(artistName)}', '${format}')" class="shrink-0 px-3 py-2 border border-zinc-700 rounded-lg text-[9px] font-mono uppercase tracking-widest hover:border-primary hover:text-primary">
                                        Preview
                                    </button>
                                </div>`;
                        }).join('')}
                    </div>
                </div>
            `;

            displayArea.scrollIntoView({ behavior: 'smooth' });
        }

        function previewVerticalEncoded(encodedUrl, encodedType, encodedName, format) {
            openAssetPreview(decodeURIComponent(encodedUrl), decodeURIComponent(encodedType), decodeURIComponent(encodedName), format);
        }

        function openVerticalSuite(artistName, clips) {
            const display = document.getElementById('active-asset-display');
            const container = document.getElementById('preview-container');
            const title = document.getElementById('vault-dj-title');
            const meta = document.getElementById('vault-meta');
            if (!display || !container || !title || !meta) return;

            const normalizedType = 'SOCIAL-SUITE';
            const label = 'MARKETING VERTICALS';

            title.textContent = (artistName || 'UNKNOWN').toUpperCase();
            title.className = 'artist-hero-title';
            meta.textContent = `${label} // ${clips.length} ASSET(S)`;

            container.classList.remove('hidden');
            display.innerHTML = '';

            const listHTML = (clips || []).map((asset, index) => {
                const format = (asset.format || (asset.key || '').split('.').pop() || 'FILE').toUpperCase();
                const assetUrl = `${CONFIG.WORKER_URL}/asset?key=${encodeURIComponent(asset.key || '')}`;
                const icon = getIcon(normalizedType);

                return `
                    <div class="flex items-center justify-between p-5 bg-[#0a0a0a] border border-zinc-800 rounded-2xl mb-2 hover:border-primary group transition-all">
                        <div class="flex items-center gap-4 min-w-0">
                            <div class="w-8 h-8 bg-zinc-900 rounded-lg flex items-center justify-center">
                                <iconify-icon icon="${icon}" class="text-zinc-600 group-hover:text-primary"></iconify-icon>
                            </div>
                            <div class="min-w-0">
                                <p class="text-[9px] font-mono text-zinc-500 uppercase tracking-widest">VERTICAL ASSET ${index + 1}</p>
                                <p class="text-[11px] font-bold text-white uppercase tracking-tight">${label}</p>
                                <p class="text-[9px] font-mono text-zinc-600 uppercase tracking-widest">${format} // ${formatBytes(asset.size)}</p>
                            </div>
                        </div>
                        <div class="flex gap-2 shrink-0">
                            <button onclick="previewVerticalEncoded('${encodeURIComponent(assetUrl)}', '${encodeURIComponent(normalizedType)}', '${encodeURIComponent(artistName)}', '${format}')" class="p-2 text-zinc-600 hover:text-white" title="Preview">
                                <iconify-icon icon="solar:play-circle-bold" class="text-xl"></iconify-icon>
                            </button>
                            <a href="${assetUrl}" download class="p-2 text-zinc-600 hover:text-primary" title="Download">
                                <iconify-icon icon="solar:cloud-download-bold" class="text-xl"></iconify-icon>
                            </a>
                        </div>
                    </div>
                `;
            }).join('');

            display.innerHTML = `
                <div class="space-y-4 animate-in fade-in slide-in-from-bottom-2">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-[10px] font-mono text-zinc-500 uppercase tracking-[0.4em]">// SOCIAL SUITE (${clips.length} CLIPS)</h3>
                        <button class="bg-zinc-900 text-[9px] font-bold text-zinc-400 px-4 py-2 rounded-lg border border-zinc-800 uppercase tracking-widest" disabled>Bulk Download</button>
                    </div>
                    <div class="max-w-3xl mx-auto">${listHTML}</div>
                </div>
            `;

            display.scrollIntoView({ behavior: 'smooth' });
        }

        function toggleFolder(folderId) {
            const preview = document.getElementById(folderId);
            const arrow = document.getElementById(`arrow-${folderId}`);
            if (!preview || !arrow) return;

            document.querySelectorAll('[id^="folder-"]').forEach(el => {
                if (el.id !== folderId) el.classList.add('hidden');
            });

            document.querySelectorAll('iconify-icon[id^="arrow-folder-"]').forEach(el => {
                if (el.id !== `arrow-${folderId}`) el.style.transform = 'rotate(0deg)';
            });

            const isHidden = preview.classList.contains('hidden');
            if (isHidden) {
                preview.classList.remove('hidden');
                arrow.style.transform = 'rotate(180deg)';
            } else {
                preview.classList.add('hidden');
                arrow.style.transform = 'rotate(0deg)';
            }
        }

        function openAssetPreviewEncoded(encodedUrl, type, encodedName, format) {
            openAssetPreview(decodeURIComponent(encodedUrl), type, decodeURIComponent(encodedName), format);
        }

        function openAssetPreview(assetUrl, assetType, djName, format) {
            const container = document.getElementById('preview-container');
            const displayArea = document.getElementById('active-asset-display');
            const title = document.getElementById('vault-dj-title');
            const meta = document.getElementById('vault-meta');
            if (!container || !displayArea || !title || !meta) return;

            const upperName = (djName || 'UNKNOWN').toUpperCase();
            title.textContent = upperName;
            title.className = 'artist-hero-title';
            meta.textContent = `UPLOAD SESSION // ${new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase()}`;

            container.classList.remove('hidden', 'opacity-0');
            displayArea.innerHTML = '';

            if (assetType === 'MASTERS' || assetType === 'MASTER') {
                displayArea.innerHTML = `
                    <div class="space-y-6">
                        <p class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-[#39FF14] animate-pulse"></span> MASTER 4K SET
                        </p>
                        <div class="aspect-video bg-black rounded-[40px] overflow-hidden border border-white/5 shadow-2xl">
                            <video src="${assetUrl}" class="w-full h-full object-cover" controls autoplay></video>
                        </div>
                        <a href="${assetUrl}" target="_blank" download class="w-full bg-white text-black font-black py-5 rounded-2xl text-[11px] uppercase tracking-widest text-center block">DOWNLOAD 4K MASTER (.MOV)</a>
                    </div>`;
            } else if (assetType === 'AUDIO') {
                displayArea.innerHTML = `
                    <div class="space-y-6 animate-in fade-in duration-500">
                        <p class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-primary"></span> HQ AUDIO MASTER (.WAV)
                        </p>

                        <div class="audio-player-wrapper">
                            <audio src="${assetUrl}" controls preload="metadata"></audio>
                        </div>

                        <a href="${assetUrl}" target="_blank" download class="w-full bg-white text-black font-black py-5 rounded-2xl text-[11px] uppercase tracking-widest text-center block hover:bg-primary transition-all">
                            DOWNLOAD HQ AUDIO
                        </a>
                    </div>`;
            } else if (assetType === 'MARKETING' || assetType === 'THUMB' || ['PNG', 'JPG', 'JPEG', 'WEBP', 'GIF'].includes(format)) {
                displayArea.innerHTML = `
                    <div class="space-y-6">
                        <p class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-[#39FF14]"></span> MARKETING THUMBNAIL
                        </p>
                        <img src="${assetUrl}" class="w-full aspect-video object-cover rounded-[40px] border border-white/10 shadow-2xl" alt="Marketing preview">
                        <a href="${assetUrl}" target="_blank" download class="w-full bg-white text-black font-black py-5 rounded-2xl text-[11px] uppercase tracking-widest text-center block">DOWNLOAD MARKETING ASSET</a>
                    </div>`;
            } else {
                displayArea.innerHTML = `
                    <div class="space-y-6">
                        <div class="bg-black rounded-[32px] overflow-hidden border border-white/5 p-6 text-[10px] font-mono text-zinc-400 uppercase tracking-widest">Preview not available for this format.</div>
                        <a href="${assetUrl}" target="_blank" download class="w-full bg-white text-black font-black py-5 rounded-2xl text-[11px] uppercase tracking-widest text-center block">DOWNLOAD FILE</a>
                    </div>`;
            }

            displayArea.scrollIntoView({ behavior: 'smooth' });
        }

        function closePreview() {
            const container = document.getElementById('preview-container');
            const displayArea = document.getElementById('active-asset-display');
            const historyList = document.getElementById('recent-sets-list') || document.getElementById('cloud-list');
            if (!container || !displayArea) return;

            container.classList.add('opacity-0');

            setTimeout(() => {
                container.classList.add('hidden');
                container.classList.remove('opacity-0');
                displayArea.innerHTML = '';
                if (historyList) historyList.scrollIntoView({ behavior: 'smooth' });
            }, 300);
        }
    </script>
</body>
</html>
