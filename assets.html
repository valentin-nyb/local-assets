<script>
    // Toggle Sidebar for Mobile
    window.toggleSidebar = () => {
        const sb = document.getElementById('sidebar');
        const ov = document.getElementById('sidebar-overlay');
        sb.classList.toggle('-translate-x-full');
        ov.classList.toggle('hidden');
        setTimeout(() => ov.classList.toggle('opacity-0'), 10);
    };

    window.markActive = (type) => document.getElementById('node-' + type)?.classList.add('active');

    window.onload = function() {
        flatpickr("#ingest-date", { defaultDate: "today", theme: "dark" });
        loadVault(); // Load the real Mux data immediately
        
        const uploadBtn = document.getElementById('upload-btn');
        uploadBtn.onclick = async function() {
            const file = document.getElementById('file-video').files[0];
            const artist = document.getElementById('ingest-name').value;
            if (!file || !artist) return alert("Artist and File are required.");

            uploadBtn.disabled = true;
            uploadBtn.innerHTML = "CONNECTING TO LOCAL/ASSETS™...";

            try {
                const response = await fetch('/api/get-upload-url', {method: 'POST',
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({
                artistName: artist
                })
            });    
                const date = document.getElementById('ingest-date').value;
                const shot = document.getElementById('ingest-shot').value;
                const xhr = new XMLHttpRequest();
                body: JSON.stringify({ 
                    
                xhr.open('PUT', data.url);
                xhr.upload.onprogress = (e) => {
                    const pct = Math.round((e.loaded / e.total) * 100);
                    uploadBtn.innerHTML = `UPLOADING: ${pct}%`;
                };
                xhr.onload = () => {
                    uploadBtn.innerHTML = "SENT TO VAULT";
                    uploadBtn.style.background = "#39FF14";
                    // Refresh the list after a few seconds so Mux has time to process
                    setTimeout(loadVault, 5000); 
                };
                xhr.send(file);
            } catch (err) {
                alert("UPLOAD ERROR: " + err.message);
                uploadBtn.disabled = false;
            }
        };
    };

    async function loadVault() {
    const list = document.getElementById('cloud-list');
    try {
        const res = await fetch('/api/list-assets');
        const data = await res.json();

        // Safety Net: If the API sent an error instead of a list
        if (data.error) {
            list.innerHTML = `<p class="text-red-500 font-mono text-[10px] uppercase">VAULT ERROR: ${data.error}</p>`;
            return;
        }

        // Handle both direct arrays and Mux's data wrapper
        const assets = Array.isArray(data) ? data : (data.data || []);

        if (assets.length === 0) {
            list.innerHTML = `<p class="text-zinc-500 font-mono text-[10px] uppercase">VAULT EMPTY // NO ASSETS FOUND</p>`;
            return;
        }

        list.innerHTML = assets.map((asset, i) => {
            const pid = asset.playback_ids?.[0]?.id;
            const status = asset.status;
            const isReady = status === 'ready';

            const artistTitle = asset.passthrough || "PROCESSING_ID_" + asset.id.slice(-4);
            
            return `
    <div class="vault-card ${isReady ? '' : 'opacity-40'}" id="vault-${i}">
        <div class="vault-card-header" onclick="toggleVaultFolder(${i})">
            <div>
                <h4 class="text-2xl font-black italic uppercase">${artistTitle}</h4>
                            ${status.toUpperCase()} // ${new Date(asset.created_at * 1000).toLocaleDateString()}
                        </span>
                    </div>
                    ${isReady ? `
                        <button class="bg-white text-black h-12 w-12 rounded-xl flex items-center justify-center hover:bg-primary transition-all">
                            <iconify-icon icon="solar:play-bold"></iconify-icon>
                        </button>
                    ` : ''}
                </div>
                <div class="asset-tray">
                    <div class="flex gap-4 pt-4">
                        ${pid ? `<button class="px-4 py-2 bg-zinc-900 border border-zinc-800 rounded-lg text-[9px] font-black hover:border-primary" 
                            onclick="event.stopPropagation(); showPreview('${pid}')">PLAY SESSION</button>` : ''}
                        <span class="px-4 py-2 bg-zinc-900 border border-zinc-800 rounded-lg text-[9px] font-black text-primary">4K MASTER .MOV</span>
                    </div>
                </div>
            </div>`;
        }).join('');
    } catch (e) {
        list.innerHTML = `<p class="text-red-500 font-mono text-[10px] uppercase">VAULT OFFLINE: ${e.message}</p>`;
    }
}

    window.showPreview = (pid) => {
        const display = document.getElementById('active-asset-display');
        document.getElementById('preview-container').classList.remove('hidden');
        display.innerHTML = `<iframe src="https://player.mux.com/${pid}" style="width:100%;border:none;aspect-ratio:16/9;" allowfullscreen></iframe>`;
        display.scrollIntoView({ behavior: 'smooth' });
    };

    window.toggleVaultFolder = (i) => document.getElementById('vault-' + i).classList.toggle('expanded');
</script>
